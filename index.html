<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nicla Sense Me - Dashboard</title>
    
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="container">
<header>
    <div class="header-left">
        <h1>👟 Nicla Sense Me</h1>
        <div class="user-profile-mini">
            <div class="input-mini">
                <label>TAILLE</label>
                <input type="number" id="input-height" value="180" onchange="updateProfile()">
                <span>cm</span>
            </div>
            <div class="input-mini">
                <label>POIDS</label>
                <input type="number" id="input-weight" value="75" onchange="updateProfile()">
                <span>kg</span>
            </div>
        </div>
    </div>
    
    <div class="header-right">
        <div class="stat-badge blue">
            <div class="label">DISTANCE</div>
            <div id="total-distance" class="val">0.0 m</div>
        </div>

        <div class="stat-badge red">
            <div class="label">ÉNERGIE</div>
            <div id="total-calories" class="val">0.0 kcal</div>
        </div>
    </div>
</header>

    <div class="main-grid">
        <div class="foot-column left-col">
            <button id="btnL" class="btn-connect btn-l" onclick="connectDevice('L')">CONNECTER GAUCHE</button>
            <div class="status-box" id="boxL">
                <span class="status-label">ÉTAT:</span> <span id="stateL" class="status-val">ARRÊT</span>
            </div>
            <div class="metrics-grid">
                <div class="card"><h3>Pas</h3><div class="value" id="stepsL" style="color: #00d2ff;">0</div></div>
                <div class="card"><h3>Vitesse</h3><div class="value" id="speedL">0.0</div><div class="unit">km/h</div></div>
                <div class="card">
                    <h3>Accélération (H | V)</h3>
                    <div class="dual-accel">
                        <div style="text-align:center"><span class="value val-h" id="accelHorizL">0.0</span><br><span class="sub-label">HORIZ</span></div>
                        <span style="color:#444">|</span>
                        <div style="text-align:center"><span class="value val-v" id="accelVertL">0.0</span><br><span class="sub-label">VERT</span></div>
                    </div>
                    <div class="unit">m/s²</div>
                </div>
                <div class="card"><h3>Batterie</h3>
                    <div class="battery-wrapper">
                        <div class="battery-shell"><div class="battery-level" id="batLevelL"></div></div>
                        <span class="bat-text" id="batTextL">--%</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="character-section">
            <div class="screen" id="visual-area">
                <svg viewBox="0 0 200 300">
                    <g id="wind-group">
                        <line class="wind" x1="170" y1="100" x2="210" y2="100" />
                        <line class="wind" x1="170" y1="140" x2="220" y2="140" style="animation-delay: 0.1s"/>
                    </g>
                    <g id="body-group">
                        <ellipse cx="100" cy="270" rx="30" ry="5" fill="rgba(0,0,0,0.1)" />
                        <path id="leg-right" d="M 110 165 L 110 210 L 110 260" stroke="#1a252f" stroke-width="16" fill="none" stroke-linecap="round" opacity="0.4" />
                        <path d="M 85 90 L 115 90 L 118 165 L 82 165 Z" fill="#34495e" />
                        <g id="head"><circle id="head-circle" cx="100" cy="60" r="23" fill="#ffdbac" /></g>
                        <path id="leg-left" d="M 92 165 L 90 210 L 90 260" stroke="#1a252f" stroke-width="16" fill="none" stroke-linecap="round" />
                        <circle id="foot-left" r="8" fill="#e74c3c" /><circle id="foot-right" r="8" fill="#e74c3c" />
                        <path id="arm-right" d="M 115 95 L 135 130 L 130 160" stroke="#1a252f" stroke-width="12" fill="none" stroke-linecap="round" opacity="0.4" />
                        <path id="arm-left" d="M 85 95 L 65 130 L 70 160" stroke="#e74c3c" stroke-width="12" fill="none" stroke-linecap="round" />
                    </g>
                </svg>
            </div>
        </div>

        <div class="foot-column right-col">
            <button id="btnR" class="btn-connect btn-r" onclick="connectDevice('R')">CONNECTER DROITE</button>
            <div class="status-box" id="boxR">
                <span class="status-label">ÉTAT:</span> <span id="stateR" class="status-val">ARRÊT</span>
            </div>
            <div class="metrics-grid">
                <div class="card"><h3>Pas</h3><div class="value" id="stepsR" style="color: #ffa502;">0</div></div>
                <div class="card"><h3>Vitesse</h3><div class="value" id="speedR">0.0</div><div class="unit">km/h</div></div>
                <div class="card">
                    <h3>Accélération (H | V)</h3>
                    <div class="dual-accel">
                        <div style="text-align:center"><span class="value val-h" id="accelHorizR">0.0</span><br><span class="sub-label">HORIZ</span></div>
                        <span style="color:#444">|</span>
                        <div style="text-align:center"><span class="value val-v" id="accelVertR">0.0</span><br><span class="sub-label">VERT</span></div>
                    </div>
                    <div class="unit">m/s²</div>
                </div>
                <div class="card"><h3>Batterie</h3>
                    <div class="battery-wrapper">
                        <div class="battery-shell"><div class="battery-level" id="batLevelR"></div></div>
                        <span class="bat-text" id="batTextR">--%</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="chart-section">
        <canvas id="dualChart"></canvas>
    </div>
</div>

<div class="control-bar">
    <button class="btn-action btn-wake" onclick="sendCommand(4)">☀ RÉVEIL</button>
    <button class="btn-action btn-calib" onclick="sendCommand(2)">⚖ CALIBRER</button>
    <button class="btn-action btn-reset" onclick="sendCommand(1)">🔄 RESET</button>
    <button class="btn-action btn-sleep" onclick="sendCommand(3)">🌙 VEILLE</button>
</div>

<script src="js/animation.js"></script>
<script src="js/logic.js"></script> <script src="js/dashboard.js"></script>
<script src="js/ble-manager.js"></script>
<script src="js/dashboard.js"></script>

</body>
</html>
