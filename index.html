<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nicla Run - Physics Monitor</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #0f1115;
            --card-bg: #1a1d24;
            --text-main: #ffffff;
            --text-sub: #8b9bb4;
            --accent-cyan: #00d2ff; /* Horizontal */
            --accent-red: #ff4b4b;  /* Vertical */
            --accent-green: #00ff9d;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            text-align: center;
        }

        /* En-tête */
        header {
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        h1 { margin: 0; font-size: 1.2rem; }
        .status { font-size: 0.8rem; color: var(--text-sub); }
        .status.connected { color: var(--accent-green); }

        /* Bouton Connexion */
        #connectBtn {
            background: linear-gradient(135deg, var(--accent-cyan), #007bff);
            border: none;
            padding: 12px 24px;
            color: white;
            font-size: 1rem;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0, 210, 255, 0.3);
            transition: transform 0.2s;
            width: 100%;
            max-width: 300px;
            margin-bottom: 20px;
        }
        #connectBtn:active { transform: scale(0.98); }

        /* Grille de données */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            max-width: 600px;
            margin: 0 auto 20px auto;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 15px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .card-full { grid-column: span 2; }

        .label {
            font-size: 0.75rem;
            color: var(--text-sub);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .value {
            font-size: 2rem;
            font-weight: 700;
        }

        .unit { font-size: 0.9rem; color: var(--text-sub); margin-left: 3px; }

        /* Styles spécifiques */
        .val-cyan { color: var(--accent-cyan); }
        .val-red { color: var(--accent-red); }
        .val-green { color: var(--accent-green); }

        /* Double valeur (H / V) */
        .dual-value {
            display: flex;
            gap: 15px;
            font-size: 1.2rem;
        }
        .dual-item { display: flex; flex-direction: column; align-items: center; }
        .dual-label { font-size: 0.6rem; color: var(--text-sub); }

        /* Graphique */
        .chart-container {
            max-width: 600px;
            margin: 0 auto;
            background-color: var(--card-bg);
            padding: 10px;
            border-radius: 15px;
            height: 250px;
        }

        /* Contrôles */
        .controls {
            max-width: 600px;
            margin: 20px auto;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
        }
        .ctrl-btn {
            background-color: #2c313a;
            border: 1px solid #3e4552;
            color: white;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .ctrl-btn:hover { background-color: #3e4552; }

    </style>
</head>
<body>

    <header>
        <div>
            <h1>NICLA RUN <span style="color:var(--accent-cyan)">V8</span></h1>
            <div id="connectionStatus" class="status">Déconnecté</div>
        </div>
        <div id="batteryDisplay" style="font-weight:bold; color: var(--text-sub);">-- V</div>
    </header>

    <button id="connectBtn">SCANNER & CONNECTER</button>

    <div class="dashboard-grid">
        <div class="card card-full">
            <div class="label">Vitesse (Horizontale)</div>
            <div class="value val-cyan"><span id="speedVal">0.0</span><span class="unit">km/h</span></div>
        </div>

        <div class="card">
            <div class="label">Session</div>
            <div class="value"><span id="stepSession">0</span></div>
        </div>
        <div class="card">
            <div class="label">Total</div>
            <div class="value"><span id="stepTotal">0</span></div>
        </div>

        <div class="card card-full">
            <div class="label">Accélérations (m/s²)</div>
            <div class="dual-value">
                <div class="dual-item">
                    <span class="value val-cyan" id="accelHorizVal">0.0</span>
                    <span class="dual-label">HORIZ (Propulsion)</span>
                </div>
                <div style="width:1px; background:#333;"></div>
                <div class="dual-item">
                    <span class="value val-red" id="accelVertVal">0.0</span>
                    <span class="dual-label">VERT (Impact)</span>
                </div>
            </div>
        </div>

        <div class="card card-full">
            <div class="label">État Détecté</div>
            <div class="value val-green" id="stateVal" style="font-size: 1.5rem;">REPOS</div>
        </div>
    </div>

    <div class="chart-container">
        <canvas id="accelChart"></canvas>
    </div>

    <div class="controls">
        <button class="ctrl-btn" onclick="sendCommand(1)">RESET PAS</button>
        <button class="ctrl-btn" onclick="sendCommand(2)">CALIBRER</button>
        <button class="ctrl-btn" onclick="toggleSleep()">VEILLE / ON</button>
    </div>

    <script>
        // --- CONFIGURATION UUIDs ---
        const SERVICE_UUID = "19b10000-0000-537e-4f6c-d104768a1214";
        
        const CHAR_UUIDS = {
            SESSION: "19b10000-1001-537e-4f6c-d104768a1214",
            TOTAL:   "19b10000-1002-537e-4F6C-d104768a1214",
            SPEED:   "19b10000-1003-537e-4f6c-d104768a1214",
            BATT:    "19b10000-1004-537e-4f6c-d104768a1214",
            HORIZ:   "19b10000-1005-537e-4f6c-d104768a1214", // Ancien "Accel" devient Horizontal
            STATE:   "19b10000-1006-537e-4f6c-d104768a1214",
            VERT:    "19b10000-1007-537e-4f6c-d104768a1214", // NOUVEAU !
            CTRL:    "19b10000-5001-537e-4f6c-d104768a1214"
        };

        // --- VARIABLES GLOBALES ---
        let device, server, service;
        let controlChar; // Pour envoyer des commandes
        let isSleep = false;

        // --- SETUP GRAPHIQUE (CHART.JS) ---
        const ctx = document.getElementById('accelChart').getContext('2d');
        const accelChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: Array(50).fill(''), // 50 points de données
                datasets: [
                    {
                        label: 'Propulsion (H)',
                        borderColor: '#00d2ff', // Cyan
                        backgroundColor: 'rgba(0, 210, 255, 0.1)',
                        borderWidth: 2,
                        pointRadius: 0,
                        tension: 0.3, // Courbe lisse
                        data: Array(50).fill(0)
                    },
                    {
                        label: 'Impact (V)',
                        borderColor: '#ff4b4b', // Rouge
                        backgroundColor: 'rgba(255, 75, 75, 0.1)',
                        borderWidth: 2,
                        pointRadius: 0,
                        tension: 0.1, // Plus sec pour l'impact
                        data: Array(50).fill(0)
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                animation: false, // Désactivé pour performance temps réel
                scales: {
                    y: {
                        beginAtZero: true,
                        suggestedMax: 20, // Echelle par défaut
                        grid: { color: '#333' }
                    },
                    x: { display: false }
                },
                plugins: {
                    legend: { labels: { color: 'white' } }
                }
            }
        });

        // --- BLUETOOTH CONNEXION ---
        document.getElementById('connectBtn').addEventListener('click', async () => {
            try {
                // 1. Scanner
                device = await navigator.bluetooth.requestDevice({
                    filters: [{ namePrefix: 'Nicla' }],
                    optionalServices: [SERVICE_UUID]
                });

                document.getElementById('connectionStatus').innerText = "Connexion...";
                
                // 2. Connexion GATT
                server = await device.gatt.connect();
                service = await server.getPrimaryService(SERVICE_UUID);

                // 3. Setup des notifications pour chaque caractéristique
                await setupCharacteristic(CHAR_UUIDS.SESSION, 'int', (v) => updateText('stepSession', v));
                await setupCharacteristic(CHAR_UUIDS.TOTAL,   'int', (v) => updateText('stepTotal', v));
                
                // Vitesse (Convertir m/s en km/h)
                await setupCharacteristic(CHAR_UUIDS.SPEED,   'float', (v) => {
                    let kmh = (v * 3.6).toFixed(1);
                    updateText('speedVal', kmh);
                });

                // Batterie
                await setupCharacteristic(CHAR_UUIDS.BATT,    'float', (v) => {
                    document.getElementById('batteryDisplay').innerText = v.toFixed(2) + " V";
                });

                // Accel HORIZONTALE (Bleu)
                await setupCharacteristic(CHAR_UUIDS.HORIZ,   'float', (v) => {
                    updateText('accelHorizVal', v.toFixed(1));
                    updateChart(0, v); // Dataset 0 = Bleu
                });

                // Accel VERTICALE (Rouge) - NOUVEAU
                await setupCharacteristic(CHAR_UUIDS.VERT,    'float', (v) => {
                    updateText('accelVertVal', v.toFixed(1));
                    updateChart(1, v); // Dataset 1 = Rouge
                });

                // État (Marche/Course)
                await setupCharacteristic(CHAR_UUIDS.STATE,   'int', (v) => {
                    const states = ["REPOS", "MARCHE", "COURSE", "SPRINT"];
                    updateText('stateVal', states[v] || "INCONNU");
                });

                // Control (Ecriture seulement)
                controlChar = await service.getCharacteristic(CHAR_UUIDS.CTRL);

                // UI Update
                document.getElementById('connectionStatus').innerText = "Connecté à " + device.name;
                document.getElementById('connectionStatus').classList.add('connected');
                document.getElementById('connectBtn').style.display = 'none';

                device.addEventListener('gattserverdisconnected', onDisconnected);

            } catch (error) {
                console.error("Erreur:", error);
                alert("Erreur connexion: " + error);
            }
        });

        // --- FONCTIONS UTILITAIRES ---

        async function setupCharacteristic(uuid, type, callback) {
            try {
                const char = await service.getCharacteristic(uuid);
                await char.startNotifications();
                char.addEventListener('characteristicvaluechanged', (event) => {
                    const value = event.target.value;
                    let parsedVal;
                    if (type === 'int') parsedVal = value.getUint32(0, true);
                    else if (type === 'float') parsedVal = value.getFloat32(0, true);
                    callback(parsedVal);
                });
            } catch (e) {
                console.warn("Caractéristique manquante ou erreur:", uuid, e);
            }
        }

        function updateText(id, val) {
            document.getElementById(id).innerText = val;
        }

        function updateChart(datasetIndex, val) {
            const chartData = accelChart.data.datasets[datasetIndex].data;
            chartData.shift(); // Enlever le vieux point
            chartData.push(val); // Ajouter le nouveau
            accelChart.update(); // Redessiner
        }

        function onDisconnected() {
            document.getElementById('connectionStatus').innerText = "Déconnecté";
            document.getElementById('connectionStatus').classList.remove('connected');
            document.getElementById('connectBtn').style.display = 'block';
            alert("Liaison perdue avec la chaussure.");
        }

        // --- COMMANDES ---
        async function sendCommand(cmdID) {
            if (!controlChar) return;
            const val = new Uint8Array([cmdID]);
            await controlChar.writeValue(val);
        }

        function toggleSleep() {
            isSleep = !isSleep;
            sendCommand(isSleep ? 3 : 4); // 3=Veille, 4=Reveil
            document.getElementById('stateVal').innerText = isSleep ? "VEILLE" : "REVEIL...";
        }

    </script>
</body>
</html>
