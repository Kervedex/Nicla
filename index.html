<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nicla Sense ME - Performance Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #121212; color: #ffffff; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        
        /* Header */
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid #333; padding-bottom: 20px; }
        h1 { margin: 0; font-size: 24px; color: #00d2ff; }
        
        /* Boutons */
        button { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        #btnConnect { background-color: #00d2ff; color: #000; }
        #btnConnect:hover { background-color: #00a0c4; }
        #btnReset { background-color: #ff4757; color: white; margin-left: 10px; }
        
        /* Grille de données */
        .metrics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background-color: #1e1e1e; padding: 20px; border-radius: 10px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .card h3 { margin: 0 0 10px 0; font-size: 14px; color: #888; text-transform: uppercase; }
        .value { font-size: 36px; font-weight: bold; }
        .unit { font-size: 14px; color: #666; }
        
        /* Couleurs spécifiques */
        #valSteps { color: #2ed573; }
        #valSpeed { color: #ffa502; }
        #valAccel { color: #ff4757; }
        
        /* État d'activité */
        .status-box { grid-column: span 2; display: flex; align-items: center; justify-content: center; background: #333; }
        #activityState { font-size: 24px; font-weight: bold; padding: 5px 15px; border-radius: 5px; }
        
        /* Graphique */
        .chart-container { background-color: #1e1e1e; padding: 20px; border-radius: 10px; height: 300px; }
        
        /* Batterie */
        .battery { position: absolute; top: 20px; right: 20px; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div>
            <h1>🏃 Nicla Sense Runner</h1>
            <span id="connectionStatus" style="color: #666;">Déconnecté</span>
        </div>
        <div>
            <button id="btnConnect" onclick="connectToNicla()">CONNEXION BLE</button>
            <button id="btnReset" onclick="resetData()" disabled>RESET</button>
        </div>
    </header>

    <div class="metrics-grid">
        <div class="card">
            <h3>Pas (Session)</h3>
            <div class="value" id="valSteps">0</div>
            <div class="unit">pas</div>
        </div>

        <div class="card">
            <h3>Vitesse Est.</h3>
            <div class="value" id="valSpeed">0.0</div>
            <div class="unit">m/s</div>
        </div>

        <div class="card">
            <h3>Force Horiz.</h3>
            <div class="value" id="valAccel">0.00</div>
            <div class="unit">g</div>
        </div>

        <div class="card status-box">
            <h3>État Actuel : </h3>
            <span id="activityState" style="color: #888; margin-left:10px;">REPOS</span>
        </div>
        
        <div class="card">
            <h3>Total Historique</h3>
            <div class="value" id="valTotal">0</div>
            <div class="unit">pas</div>
        </div>

        <div class="card">
            <h3>Batterie</h3>
            <div class="value" id="valBat">--</div>
            <div class="unit">Volts</div>
        </div>
    </div>

    <div class="chart-container">
        <canvas id="accelChart"></canvas>
    </div>
</div>

<script>
    // --- UUIDs (Doivent correspondre EXACTEMENT au code Arduino) ---
    const SERVICE_UUID          = "19b10000-0000-537e-4f6c-d104768a1214";
    const CHAR_PAS_SESSION_UUID = "19b10000-1001-537e-4f6c-d104768a1214";
    const CHAR_PAS_TOTAL_UUID   = "19b10000-1002-537e-4f6c-d104768a1214";
    const CHAR_VITESSE_UUID     = "19b10000-1003-537e-4F6C-d104768a1214";
    const CHAR_BATTERY_UUID     = "19b10000-1004-537e-4f6c-d104768a1214";
    const CHAR_ACCEL_UUID       = "19b10000-1005-537e-4f6c-d104768a1214";
    const CHAR_ETAT_UUID        = "19b10000-1006-537e-4f6c-d104768a1214";

    let device, server, service;
    let charPasSession; 

    // --- CONFIG GRAPHIQUE ---
    const ctx = document.getElementById('accelChart').getContext('2d');
    const accelChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: Array(50).fill(''),
            datasets: [{
                label: 'Accélération Horizontale (g)',
                data: Array(50).fill(0),
                borderColor: '#00d2ff',
                borderWidth: 2,
                tension: 0.3,
                pointRadius: 0
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            animation: false,
            scales: {
                y: { min: 0, max: 2.5, grid: { color: '#333' } },
                x: { display: false }
            },
            plugins: { legend: { display: true, labels: { color: 'white' } } }
        }
    });

    async function connectToNicla() {
        try {
            console.log('Recherche...');
            device = await navigator.bluetooth.requestDevice({
                filters: [{ name: 'NiclaL' }], // <<< Assure-toi que c'est le même nom que dans Arduino
                optionalServices: [SERVICE_UUID]
            });

            document.getElementById('connectionStatus').innerText = "Connexion...";
            server = await device.gatt.connect();
            service = await server.getPrimaryService(SERVICE_UUID);

            // --- LIAISON DES CARACTERISTIQUES ---
            
            // 1. Pas Session
            charPasSession = await service.getCharacteristic(CHAR_PAS_SESSION_UUID);
            await charPasSession.startNotifications();
            charPasSession.addEventListener('characteristicvaluechanged', (event) => {
                let val = event.target.value.getUint32(0, true);
                document.getElementById('valSteps').innerText = val;
            });

            // 2. Pas Total
            const charTotal = await service.getCharacteristic(CHAR_PAS_TOTAL_UUID);
            await charTotal.startNotifications();
            charTotal.addEventListener('characteristicvaluechanged', (event) => {
                document.getElementById('valTotal').innerText = event.target.value.getUint32(0, true);
            });

            // 3. Vitesse
            const charVitesse = await service.getCharacteristic(CHAR_VITESSE_UUID);
            await charVitesse.startNotifications();
            charVitesse.addEventListener('characteristicvaluechanged', (event) => {
                let v = event.target.value.getFloat32(0, true).toFixed(2);
                document.getElementById('valSpeed').innerText = v;
            });

            // 4. Accélération (Mise à jour du graph)
            const charAccel = await service.getCharacteristic(CHAR_ACCEL_UUID);
            await charAccel.startNotifications();
            charAccel.addEventListener('characteristicvaluechanged', (event) => {
                let a = event.target.value.getFloat32(0, true);
                document.getElementById('valAccel').innerText = a.toFixed(2);
                updateChart(a);
            });

            // 5. État (0, 1, 2, 3)
            const charEtat = await service.getCharacteristic(CHAR_ETAT_UUID);
            await charEtat.startNotifications();
            charEtat.addEventListener('characteristicvaluechanged', (event) => {
                updateStateUI(event.target.value.getUint32(0, true));
            });
            
            // 6. Batterie
            const charBat = await service.getCharacteristic(CHAR_BATTERY_UUID);
            await charBat.startNotifications();
            charBat.addEventListener('characteristicvaluechanged', (event) => {
                document.getElementById('valBat').innerText = event.target.value.getFloat32(0, true).toFixed(2);
            });

            document.getElementById('connectionStatus').innerText = "Connecté à " + device.name;
            document.getElementById('connectionStatus').style.color = "#2ed573";
            document.getElementById('btnReset').disabled = false;
            document.getElementById('btnConnect').style.display = 'none';

        } catch (error) {
            console.error(error);
            alert("Erreur de connexion : " + error);
        }
    }

    // Fonction de Reset (Envoie '1' au service de pas)
    async function resetData() {
        if (!charPasSession) return;
        let resetVal = Uint32Array.of(1); // N'importe quelle valeur déclenche le if(written)
        await charPasSession.writeValue(resetVal);
        // Reset visuel
        document.getElementById('valSteps').innerText = "0";
        document.getElementById('valTotal').innerText = "0";
        updateStateUI(0);
    }

    // Mise à jour du graph en temps réel
    function updateChart(newVal) {
        const data = accelChart.data.datasets[0].data;
        data.shift();
        data.push(newVal);
        accelChart.update();
    }

    // Mise à jour de l'UI État
    function updateStateUI(stateCode) {
        const el = document.getElementById('activityState');
        switch(stateCode) {
            case 0: 
                el.innerText = "REPOS / SOL"; 
                el.style.color = "#888"; 
                break;
            case 1: 
                el.innerText = "MARCHE"; 
                el.style.color = "#2ed573"; // Vert
                break;
            case 2: 
                el.innerText = "COURSE"; 
                el.style.color = "#ffa502"; // Orange
                break;
            case 3: 
                el.innerText = "SPRINT"; 
                el.style.color = "#ff4757"; // Rouge
                break;
        }
    }
</script>

</body>
</html>
