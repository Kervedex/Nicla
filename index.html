<script>
    // UUIDs
    const SERVICE_UUID          = "19b10000-0000-537e-4f6c-d104768a1214";
    const CHAR_PAS_SESSION_UUID = "19b10000-1001-537e-4f6c-d104768a1214";
    const CHAR_VITESSE_UUID     = "19b10000-1003-537e-4f6c-d104768a1214";
    const CHAR_BATTERY_UUID     = "19b10000-1004-537e-4f6c-d104768a1214";
    const CHAR_ACCEL_HORIZ_UUID = "19b10000-1005-537e-4f6c-d104768a1214"; 
    const CHAR_ETAT_UUID        = "19b10000-1006-537e-4f6c-d104768a1214";
    const CHAR_ACCEL_VERT_UUID  = "19b10000-1007-537e-4f6c-d104768a1214"; 
    const CHAR_CONTROL_UUID     = "19b10000-5001-537e-4f6c-d104768a1214"; 

    let charControlL = null, charControlR = null;

    // --- VARIABLES DE STABILISATION (NOUVEAU) ---
    // On stocke les timers pour chaque côté afin de pouvoir les annuler
    let stateTimers = { L: null, R: null };
    // Délai avant de valider un changement d'état (en ms)
    // 800ms est un bon compromis entre réactivité et stabilité
    const STATE_DEBOUNCE_DELAY = 800; 

    // --- CONFIG GRAPHIQUE ---
    const ctx = document.getElementById('dualChart').getContext('2d');
    const dualChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: Array(60).fill(''),
            datasets: [
                {
                    label: 'Propulsion GAUCHE (Horiz)',
                    data: Array(60).fill(0),
                    borderColor: '#00d2ff',
                    borderWidth: 2,
                    tension: 0.3,
                    pointRadius: 0
                },
                {
                    label: 'Propulsion DROITE (Horiz)',
                    data: Array(60).fill(0),
                    borderColor: '#ffa502',
                    borderWidth: 2,
                    tension: 0.3,
                    pointRadius: 0
                }
            ]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false, 
            animation: false,
            scales: {
                y: { min: 0, max: 20, grid: { color: '#333' } },
                x: { display: false }
            },
            plugins: { legend: { labels: { color: 'white' } } }
        }
    });

    // --- CONNEXION ---
    async function connectDevice(side) {
        const nameFilter = (side === 'L') ? 'NiclaL' : 'NiclaR'; 
        const btn = document.getElementById('btn' + side);

        try {
            const device = await navigator.bluetooth.requestDevice({
                filters: [{ name: nameFilter }],
                optionalServices: [SERVICE_UUID]
            });
            btn.innerText = "CONNEXION...";
            const server = await device.gatt.connect();
            const service = await server.getPrimaryService(SERVICE_UUID);

            // PAS
            setupChar(service, CHAR_PAS_SESSION_UUID, 'int', (v) => document.getElementById('steps' + side).innerText = v);
            
            // VITESSE
            setupChar(service, CHAR_VITESSE_UUID, 'float', (v) => {
                document.getElementById('speed' + side).innerText = v.toFixed(1);
                
                // Si vitesse très faible, on demande l'état ARRÊT via le tampon
                if (v < 1.0) {
                    bufferStateUpdate(side, 0); 
                }
            });
            
            // ACCEL HORIZONTALE
            setupChar(service, CHAR_ACCEL_HORIZ_UUID, 'float', (v) => {
                document.getElementById('accelHoriz' + side).innerText = v.toFixed(1);
                updateChart(side, v);
            });

            // ACCEL VERTICALE
            setupChar(service, CHAR_ACCEL_VERT_UUID, 'float', (v) => {
                document.getElementById('accelVert' + side).innerText = v.toFixed(1);
            });

            // BATTERIE
            setupChar(service, CHAR_BATTERY_UUID, 'float', (v) => updateBatteryUI(side, v));
            
            // ETAT (Passe maintenant par le tampon bufferStateUpdate)
            setupChar(service, CHAR_ETAT_UUID, 'int', (v) => bufferStateUpdate(side, v));

            // CONTROLE
            const ctrl = await service.getCharacteristic(CHAR_CONTROL_UUID);
            if(side === 'L') charControlL = ctrl; else charControlR = ctrl;

            btn.innerText = "CONNECTÉ";
            btn.classList.add("connected");

        } catch (error) {
            console.error(error);
            alert("Erreur: " + error);
            btn.innerText = "ECHEC";
        }
    }

    async function setupChar(service, uuid, type, callback) {
        try {
            const char = await service.getCharacteristic(uuid);
            await char.startNotifications();
            char.addEventListener('characteristicvaluechanged', (e) => {
                const val = e.target.value;
                let parsed = (type === 'int') ? val.getUint32(0, true) : val.getFloat32(0, true);
                callback(parsed);
            });
        } catch(e) { console.warn("UUID introuvable: " + uuid); }
    }

    async function sendCommand(cmdCode) {
        const val = Uint8Array.of(cmdCode);
        if (charControlL) await charControlL.writeValue(val);
        if (charControlR) await charControlR.writeValue(val);
        
        if(cmdCode === 1) { // Reset visuel
             document.getElementById('stepsL').innerText = "0"; 
             document.getElementById('stepsR').innerText = "0";
             // On force la mise à jour immédiate pour le reset
             updateStateImmediate('L', 0); 
             updateStateImmediate('R', 0);
        }
    }

    // --- FONCTION DE STABILISATION (NOUVEAU) ---
    function bufferStateUpdate(side, newState) {
        // 1. On annule toute mise à jour d'état qui était en attente pour ce côté
        if (stateTimers[side]) {
            clearTimeout(stateTimers[side]);
        }

        // 2. On crée un nouveau délai. 
        // L'interface ne changera QUE si aucune autre nouvelle valeur n'arrive pendant 800ms
        stateTimers[side] = setTimeout(() => {
            updateStateImmediate(side, newState);
        }, STATE_DEBOUNCE_DELAY);
    }

    // Fonction qui fait le changement visuel réel (appelée après le délai)
    function updateStateImmediate(side, state) {
        const el = document.getElementById('state' + side);
        const box = document.getElementById('box' + side);
        const states = ["ARRÊT", "MARCHE", "COURSE", "SPRINT"];
        
        // Si l'élément affiche déjà le bon état, on ne fait rien (optimisation)
        if (el.innerText === states[state]) return;

        let color = "#666";
        if(state === 1) color = "#2ed573"; 
        if(state === 2) color = "#ffa502"; 
        if(state === 3) color = "#ff4757"; 
        
        el.innerText = states[state] || "INCONNU"; 
        
        if(state === 0) {
            el.style.color = "#888";
            box.style.border = "none";
        } else {
            el.style.color = color;
            box.style.border = `1px solid ${color}`;
        }
    }

    function updateChart(side, value) {
        const idx = (side === 'L') ? 0 : 1;
        const data = dualChart.data.datasets[idx].data;
        data.shift(); data.push(value);
        dualChart.update();
    }

    function updateBatteryUI(side, voltage) {
        let pct = (voltage - 3.3) / (4.2 - 3.3) * 100;
        if (pct > 100) pct = 100; if (pct < 0) pct = 0;
        
        const bar = document.getElementById('batLevel' + side);
        const txt = document.getElementById('batText' + side);
        
        txt.innerText = Math.round(pct) + "%";
        bar.style.width = pct + "%";
        
        if (pct > 50) bar.style.backgroundColor = "#2ed573"; 
        else if (pct > 20) bar.style.backgroundColor = "#ffa502";
        else bar.style.backgroundColor = "#ff4757";
    }
</script>
