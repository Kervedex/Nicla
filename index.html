<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nicla Pro Dashboard</title>
    <style>
        :root { --p: #007bff; --s: #28a745; --d: #dc3545; --gray: #6c757d; --dark: #212529; }
        body { font-family: 'Segoe UI', sans-serif; background: #e9ecef; display: flex; flex-direction: column; align-items: center; padding: 10px; margin: 0; }
        
        /* HEADER GLOBAL */
        .global-stats { 
            background: var(--dark); color: white; width: 95%; max-width: 1000px; 
            padding: 20px; border-radius: 20px; text-align: center; margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.25);
        }
        .global-steps { font-size: 4.5rem; font-weight: 900; margin: 0; line-height: 1; color: var(--s); }
        .sub-text { font-size: 0.9rem; opacity: 0.7; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px; }
        .reset-btn { background: var(--d); color: white; border: none; padding: 12px 30px; border-radius: 50px; cursor: pointer; font-weight: bold; font-size: 1rem; }

        /* PANNEAUX PIEDS */
        .container { display: flex; gap: 15px; width: 100%; max-width: 1000px; justify-content: center; flex-wrap: wrap; }
        .foot-panel { 
            flex: 1; min-width: 320px; background: white; padding: 15px; border-radius: 20px; 
            text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.05); 
            border-top: 10px solid var(--gray);
        }
        #panel-L { border-top-color: var(--p); }
        #panel-R { border-top-color: var(--d); }

        /* GRILLE DE DATA */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .card { background: #f8f9fa; padding: 10px; border-radius: 10px; border: 1px solid #eee; }
        .card h3 { font-size: 0.7rem; margin: 0; color: #888; text-transform: uppercase; }
        .card p { font-size: 1.3rem; font-weight: 800; margin: 2px 0; }

        .status-indicator {
            font-size: 1.1rem; font-weight: bold; margin: 10px 0; padding: 8px;
            border-radius: 8px; background: #eee; color: #777; transition: 0.2s;
        }
        .moving { background: var(--s) !important; color: white !important; transform: scale(1.02); }

        .batt-bar { height: 6px; background: #eee; border-radius: 3px; overflow: hidden; margin-top:5px; }
        .batt-fill { height: 100%; width: 0%; background: var(--s); transition: 0.5s; }

        button.conn { width: 100%; padding: 12px; border-radius: 8px; border: none; background: #333; color: white; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="global-stats">
        <div class="sub-text">Pas Confirmés (Smart Logic)</div>
        <div class="global-steps" id="smartSteps">0</div>
        <button class="reset-btn" id="btnReset">RÉINITIALISER TOUT</button>
    </div>

    <div class="container">
        <div class="foot-panel" id="panel-L">
            <h2 style="color:var(--p)">GAUCHE</h2>
            <button class="conn" id="btnL" onclick="connect('L')">Connecter</button>
            <div id="statL" class="status-indicator">AU SOL</div>
            
            <div class="grid">
                <div class="card" style="grid-column: span 2;">
                    <h3>Batterie</h3>
                    <p id="battL">--%</p>
                    <div class="batt-bar"><div id="barL" class="batt-fill"></div></div>
                </div>
                <div class="card"><h3>Accél. (m/s²)</h3><p id="accL">0.00</p></div>
                <div class="card"><h3>Vitesse (m/s)</h3><p id="vitL">0.00</p></div>
            </div>
        </div>

        <div class="foot-panel" id="panel-R">
            <h2 style="color:var(--d)">DROIT</h2>
            <button class="conn" id="btnR" onclick="connect('R')">Connecter</button>
            <div id="statR" class="status-indicator">AU SOL</div>
            
            <div class="grid">
                <div class="card" style="grid-column: span 2;">
                    <h3>Batterie</h3>
                    <p id="battR">--%</p>
                    <div class="batt-bar"><div id="barR" class="batt-fill"></div></div>
                </div>
                <div class="card"><h3>Accél. (m/s²)</h3><p id="accR">0.00</p></div>
                <div class="card"><h3>Vitesse (m/s)</h3><p id="vitR">0.00</p></div>
            </div>
        </div>
    </div>

    <script>
        // UUIDs
        const UUID = {
            vit:  "19b10000-1003-537e-4f6c-d104768a1214",
            batt: "19b10000-1004-537e-4f6c-d104768a1214",
            acc:  "19b10000-1005-537e-4f6c-d104768a1214",
            etat: "19b10000-1006-537e-4f6c-d104768a1214",
            reset:"19b10000-1002-537e-4f6c-d104768a1214"
        };

        // État Logic
        let stateL = 0, stateR = 0, globalSteps = 0;
        let writers = { L: null, R: null }; // Pour le reset

        function updateSteps() {
            document.getElementById('smartSteps').innerText = globalSteps;
        }

        // --- LOGIQUE CROISÉE (GAIT ANALYSIS) ---
        function processGait(side, newState) {
            // Un pas gauche valide si Gauche atterrit (1->0) ALORS QUE Droit est au sol (0)
            if (side === 'L') {
                if (stateL === 1 && newState === 0) {
                    if (stateR === 0) { globalSteps++; updateSteps(); }
                }
                stateL = newState;
                updateVisual('L', newState);
            }
            // Idem pour Droite
            else if (side === 'R') {
                if (stateR === 1 && newState === 0) {
                    if (stateL === 0) { globalSteps++; updateSteps(); }
                }
                stateR = newState;
                updateVisual('R', newState);
            }
        }

        function updateVisual(side, s) {
            const el = document.getElementById('stat' + side);
            if (s == 1) {
                el.innerText = "EN L'AIR";
                el.classList.add('moving');
            } else {
                el.innerText = "AU SOL";
                el.classList.remove('moving');
            }
        }

        // --- CONNEXION BLE ---
        async function connect(side) {
            try {
                const nameT = side === 'L' ? 'NiclaL' : 'NiclaR';
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ name: nameT }],
                    optionalServices: ["19b10000-0000-537e-4f6c-d104768a1214"]
                });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService("19b10000-0000-537e-4f6c-d104768a1214");
                document.getElementById('btn' + side).style.display = 'none';

                // Sauvegarde pour Reset
                writers[side] = await service.getCharacteristic(UUID.reset);

                // Écoute générique
                const listen = async (uuid, cb) => {
                    const c = await service.getCharacteristic(uuid);
                    await c.startNotifications();
                    c.addEventListener('characteristicvaluechanged', cb);
                };

                // 1. ÉTAT (Logique Pas)
                listen(UUID.etat, (e) => processGait(side, e.target.value.getUint32(0, true)));
                
                // 2. VITESSE
                listen(UUID.vit, (e) => document.getElementById('vit'+side).innerText = e.target.value.getFloat32(0,true).toFixed(2));
                
                // 3. ACCEL
                listen(UUID.acc, (e) => document.getElementById('acc'+side).innerText = e.target.value.getFloat32(0,true).toFixed(2));

                // 4. BATTERIE
                listen(UUID.batt, (e) => {
                    let v = e.target.value.getFloat32(0, true);
                    let pct = Math.max(0, Math.min(100, Math.round((v - 3.5) * 100 / (4.2 - 3.5))));
                    document.getElementById('batt'+side).innerText = pct + "%";
                    document.getElementById('bar'+side).style.width = pct + "%";
                });

            } catch (err) { console.log(err); }
        }

        // --- RESET ---
        document.getElementById('btnReset').onclick = async () => {
            globalSteps = 0;
            updateSteps();
            // Reset valeurs visuelles
            ['acc','vit'].forEach(k => {
                if(document.getElementById(k+'L')) document.getElementById(k+'L').innerText = "0.00";
                if(document.getElementById(k+'R')) document.getElementById(k+'R').innerText = "0.00";
            });

            // Envoi commande aux Nicla
            const payload = new Uint32Array([1]);
            if(writers.L) await writers.L.writeValue(payload);
            if(writers.R) await writers.R.writeValue(payload);
        };
    </script>
</body>
</html>
