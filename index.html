<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nicla Pro - Comparatif Algos</title>
    <style>
        :root { --p: #007bff; --s: #28a745; --d: #dc3545; --w: #ffc107; --purp: #6f42c1; --gray: #6c757d; --dark: #212529; --orange: #fd7e14; }
        body { font-family: 'Segoe UI', sans-serif; background: #e9ecef; display: flex; flex-direction: column; align-items: center; padding: 10px; margin: 0; }
        
        .global-stats { 
            background: var(--dark); color: white; width: 95%; max-width: 1100px; 
            padding: 20px; border-radius: 20px; text-align: center; margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.25);
            display: grid; grid-template-columns: 1fr 1fr; align-items: center; gap: 20px;
        }
        
        .global-status-badge {
            grid-column: span 2;
            font-size: 2rem; font-weight: 900; padding: 15px; border-radius: 15px;
            background: #333; color: #777; letter-spacing: 2px; text-transform: uppercase;
            transition: 0.3s;
        }

        .count-box { background: rgba(255,255,255,0.1); padding: 15px; border-radius: 15px; }
        .global-steps { font-size: 3.5rem; font-weight: 900; line-height: 1; color: var(--s); }
        .sub-text { font-size: 0.8rem; opacity: 0.7; text-transform: uppercase; letter-spacing: 1px; }
        
        .reset-btn { grid-column: span 2; background: var(--d); color: white; border: none; padding: 12px; border-radius: 50px; cursor: pointer; font-weight: bold; width: 50%; margin: 10px auto; }

        .container { display: flex; gap: 15px; width: 100%; max-width: 1100px; justify-content: center; flex-wrap: wrap; }
        .foot-panel { 
            flex: 1; min-width: 340px; background: white; padding: 20px; border-radius: 20px; 
            text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.05); 
            border-top: 10px solid var(--gray); position: relative;
        }
        #panel-L { border-top-color: var(--p); }
        #panel-R { border-top-color: var(--d); }

        .local-status {
            position: absolute; top: 20px; right: 20px; font-weight: bold; font-size: 0.8rem;
            padding: 5px 10px; border-radius: 5px; background: #eee; color: #999;
        }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .card { background: #f8f9fa; padding: 10px; border-radius: 10px; border: 1px solid #eee; }
        .card h3 { font-size: 0.7rem; margin: 0; color: #888; text-transform: uppercase; }
        .card p { font-size: 1.4rem; font-weight: 800; margin: 2px 0; color: #333; }
        
        .card-home { border: 2px solid var(--p); background: #e3f2fd; } /* Ton Algo */
        .card-chip { border: 2px solid var(--orange); background: #fff3cd; } /* Algo Puce */

        .batt-bar { height: 6px; background: #eee; border-radius: 3px; overflow: hidden; margin-top:5px; }
        .batt-fill { height: 100%; width: 0%; background: var(--s); transition: 0.5s; }
        button.conn { width: 100%; padding: 12px; border-radius: 8px; border: none; background: #333; color: white; font-weight: bold; cursor: pointer; margin-bottom: 20px; }
        
        .bg-walk   { background: var(--s) !important; color: white !important; }
        .bg-run    { background: var(--w) !important; color: #333 !important; }
        .bg-sprint { background: var(--purp) !important; color: white !important; }

    </style>
</head>
<body>

    <div class="global-stats">
        <div id="globalStatus" class="global-status-badge">PRÊT</div>
        
        <div class="count-box">
            <div class="sub-text">Pas Validés (Smart Logic)</div>
            <div class="global-steps" id="smartSteps">0</div>
        </div>
        
        <div class="count-box">
            <div class="sub-text">État</div>
            <div style="font-size:1.5rem; font-weight:bold; margin-top:10px" id="sysState">--</div>
        </div>

        <button class="reset-btn" id="btnReset">RESET TOUS LES COMPTEURS</button>
    </div>

    <div class="container">
        <div class="foot-panel" id="panel-L">
            <h2 style="color:var(--p); margin-top:0;">GAUCHE</h2>
            <div id="localStatL" class="local-status">SOL</div>
            <button class="conn" id="btnL" onclick="connect('L')">Connecter Gauche</button>
            <div class="grid">
                <div class="card card-home"><h3>Algo Maison</h3><p id="pasSL">0</p></div>
                <div class="card card-chip"><h3>Puce Intégrée</h3><p id="pasChipL" style="color:var(--orange)">0</p></div>

                <div class="card"><h3>Intensité</h3><p id="vitL">0.00</p></div>
                <div class="card"><h3>Impact (G)</h3><p id="accL">0.00</p></div>
                <div class="card" style="grid-column: span 2;"><h3>Batterie</h3><p id="battL">--%</p><div class="batt-bar"><div id="barL" class="batt-fill"></div></div></div>
            </div>
        </div>

        <div class="foot-panel" id="panel-R">
            <h2 style="color:var(--d); margin-top:0;">DROITE</h2>
            <div id="localStatR" class="local-status">SOL</div>
            <button class="conn" id="btnR" onclick="connect('R')">Connecter Droite</button>
            <div class="grid">
                <div class="card card-home"><h3>Algo Maison</h3><p id="pasSR">0</p></div>
                <div class="card card-chip"><h3>Puce Intégrée</h3><p id="pasChipR" style="color:var(--orange)">0</p></div>

                <div class="card"><h3>Intensité</h3><p id="vitR">0.00</p></div>
                <div class="card"><h3>Impact (G)</h3><p id="accR">0.00</p></div>
                <div class="card" style="grid-column: span 2;"><h3>Batterie</h3><p id="battR">--%</p><div class="batt-bar"><div id="barR" class="batt-fill"></div></div></div>
            </div>
        </div>
    </div>

    <script>
        const UUID = {
            pasS: "19b10000-1001-537e-4f6c-d104768a1214", // Ton algo
            pasT: "19b10000-1002-537e-4f6c-d104768a1214",
            vit:  "19b10000-1003-537e-4f6c-d104768a1214",
            batt: "19b10000-1004-537e-4f6c-d104768a1214",
            acc:  "19b10000-1005-537e-4f6c-d104768a1214",
            etat: "19b10000-1006-537e-4f6c-d104768a1214",
            chip: "19b10000-1007-537e-4f6c-d104768a1214"  // Algo Puce
        };

        let stateL = 0, stateR = 0, smartSteps = 0;
        let writers = { L: null, R: null };

        function updateGlobalStatus() {
            const el = document.getElementById('globalStatus');
            const sys = document.getElementById('sysState');
            let maxState = Math.max(stateL, stateR);

            el.className = "global-status-badge"; 

            if (maxState === 3) {
                el.innerText = "SPRINT ⚡"; el.classList.add('bg-sprint'); sys.innerText = "Max Power";
            } else if (maxState === 2) {
                el.innerText = "COURSE"; el.classList.add('bg-run'); sys.innerText = "Endurance";
            } else if (maxState === 1) {
                el.innerText = "MARCHE"; el.classList.add('bg-walk'); sys.innerText = "Actif";
            } else {
                el.innerText = "ARRÊT"; el.style.background = "#333"; el.style.color = "#777"; sys.innerText = "Repos";
            }
        }

        function updateLocalStatus(side, s) {
            const el = document.getElementById('localStat' + side);
            if (s === 0) { el.innerText = "SOL"; el.style.background="#eee"; el.style.color="#999"; }
            if (s >= 1) { el.innerText = "MOUVEMENT"; el.style.background="var(--p)"; el.style.color="white"; }
        }

        function processGait(side, newState) {
            if (newState === 0) { 
                let oldState = (side === 'L') ? stateL : stateR;
                let otherState = (side === 'L') ? stateR : stateL;
                
                if (oldState > 0 && otherState === 0) {
                    smartSteps++;
                    document.getElementById('smartSteps').innerText = smartSteps;
                }
            }
            if (side === 'L') stateL = newState; else stateR = newState;
            updateLocalStatus(side, newState);
            updateGlobalStatus();
        }

        async function connect(side) {
            const btn = document.getElementById('btn' + side);
            btn.innerText = "Recherche..."; btn.disabled = true;

            try {
                const nameT = side === 'L' ? 'NiclaL' : 'NiclaR';
                const device = await navigator.bluetooth.requestDevice({ 
                    filters: [{ name: nameT }], 
                    optionalServices: ["19b10000-0000-537e-4f6c-d104768a1214"] 
                });
                
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService("19b10000-0000-537e-4f6c-d104768a1214");
                
                btn.style.display = 'none'; 
                writers[side] = await service.getCharacteristic(UUID.pasS);

                const listen = async (uuid, cb) => {
                    const c = await service.getCharacteristic(uuid);
                    await c.startNotifications();
                    c.addEventListener('characteristicvaluechanged', cb);
                };

                listen(UUID.etat, (e) => processGait(side, e.target.value.getUint32(0, true)));
                listen(UUID.pasS, (e) => document.getElementById('pasSL'+(side==='R'?'':'')).innerText = e.target.value.getUint32(0,true));
                // Correction pour l'affichage correct gauche/droite
                listen(UUID.pasS, (e) => document.getElementById('pasS'+side).innerText = e.target.value.getUint32(0,true));
                
                // NOUVEAU : Écoute du compteur PUCE
                listen(UUID.chip, (e) => document.getElementById('pasChip'+side).innerText = e.target.value.getUint32(0,true));
                
                listen(UUID.vit,  (e) => document.getElementById('vit'+side).innerText = e.target.value.getFloat32(0,true).toFixed(2));
                listen(UUID.acc,  (e) => document.getElementById('acc'+side).innerText = e.target.value.getFloat32(0,true).toFixed(2));
                listen(UUID.batt, (e) => {
                    let v = e.target.value.getFloat32(0, true);
                    let pct = Math.max(0, Math.min(100, Math.round((v - 3.5) * 100 / (4.2 - 3.5))));
                    document.getElementById('batt'+side).innerText = pct + "%";
                    document.getElementById('bar'+side).style.width = pct + "%";
                });

            } catch (err) { 
                console.error(err); 
                btn.innerText = "Réessayer"; btn.disabled = false;
                alert("Erreur connexion : " + err); 
            }
        }

        document.getElementById('btnReset').onclick = async () => {
            smartSteps = 0; document.getElementById('smartSteps').innerText = "0";
            const payload = new Uint32Array([0]);
            try {
                if(writers.L) await writers.L.writeValue(payload);
                if(writers.R) await writers.R.writeValue(payload);
            } catch(e) {}
            
            // Reset visuel
            ['pasS','pasChip','vit','acc'].forEach(p => {
                if(document.getElementById(p+'L')) document.getElementById(p+'L').innerText = "0";
                if(document.getElementById(p+'R')) document.getElementById(p+'R').innerText = "0";
            });
            updateGlobalStatus();
        };
    </script>
</body>
</html>
