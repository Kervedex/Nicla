<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nicla Sense</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #121212; color: #ffffff; margin: 0; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        
        /* Header */
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        h1 { margin: 0; font-size: 24px; color: #fff; }
        #btnReset { background-color: #ff4757; color: white; padding: 10px 30px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 16px;}
        #btnReset:disabled { background-color: #555; cursor: not-allowed; }

        /* Layout 2 Colonnes */
        .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
        .foot-column { background: #1a1a1a; padding: 20px; border-radius: 15px; border-top: 5px solid #444; }
        
        /* Styles spécifiques GAUCHE vs DROITE */
        .left-col { border-top-color: #00d2ff; }
        .right-col { border-top-color: #ffa502; }
        .left-title { color: #00d2ff; }
        .right-title { color: #ffa502; }

        /* Boutons de connexion */
        .btn-connect { width: 100%; padding: 15px; margin-bottom: 20px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; }
        .btn-l { background-color: #00d2ff; color: #000; }
        .btn-l:hover { background-color: #00a0c4; }
        .btn-r { background-color: #ffa502; color: #000; }
        .btn-r:hover { background-color: #d18802; }
        .connected { background-color: #2ed573 !important; color: white !important; cursor: default; }

        /* Cards */
        .metrics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card { background-color: #252525; padding: 15px; border-radius: 10px; text-align: center; }
        .card h3 { margin: 0 0 5px 0; font-size: 12px; color: #aaa; text-transform: uppercase; }
        .value { font-size: 28px; font-weight: bold; }
        .unit { font-size: 12px; color: #666; }

        /* Status Box */
        .status-box { grid-column: span 2; background: #333; display: flex; align-items: center; justify-content: center; padding: 10px; border-radius: 8px;}
        .status-text { font-size: 20px; font-weight: bold; margin-left: 10px; }

        /* Graphique */
        .chart-section { margin-top: 30px; background-color: #1e1e1e; padding: 20px; border-radius: 10px; height: 350px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>👟 Dual Sense Me</h1>
        <button id="btnReset" onclick="resetAll()" disabled>RESET SESSION</button>
    </header>

    <div class="main-grid">
        
        <div class="foot-column left-col">
            <h2 class="left-title">PIED GAUCHE (NiclaL)</h2>
            <button id="btnL" class="btn-connect btn-l" onclick="connectDevice('L')">CONNECTER GAUCHE</button>
            
            <div class="status-box" id="boxL">
                <span>ÉTAT:</span> <span id="stateL" class="status-text" style="color:#888">DÉCONNECTÉ</span>
            </div>
            <br>

            <div class="metrics-grid">
                <div class="card">
                    <h3>Pas Session</h3>
                    <div class="value" id="stepsL" style="color: #00d2ff;">0</div>
                </div>
                <div class="card">
                    <h3>Vitesse (m/s)</h3>
                    <div class="value" id="speedL">0.0</div>
                </div>
                <div class="card">
                    <h3>Force (g)</h3>
                    <div class="value" id="accelL">0.00</div>
                </div>
                <div class="card">
                    <h3>Batterie</h3>
                    <div class="value" id="batL">--</div>
                    <div class="unit">Volts</div>
                </div>
            </div>
        </div>

        <div class="foot-column right-col">
            <h2 class="right-title">PIED DROIT (NiclaR)</h2>
            <button id="btnR" class="btn-connect btn-r" onclick="connectDevice('R')">CONNECTER DROITE</button>

            <div class="status-box" id="boxR">
                <span>ÉTAT:</span> <span id="stateR" class="status-text" style="color:#888">DÉCONNECTÉ</span>
            </div>
            <br>

            <div class="metrics-grid">
                <div class="card">
                    <h3>Pas Session</h3>
                    <div class="value" id="stepsR" style="color: #ffa502;">0</div>
                </div>
                <div class="card">
                    <h3>Vitesse (m/s)</h3>
                    <div class="value" id="speedR">0.0</div>
                </div>
                <div class="card">
                    <h3>Force (g)</h3>
                    <div class="value" id="accelR">0.00</div>
                </div>
                <div class="card">
                    <h3>Batterie</h3>
                    <div class="value" id="batR">--</div>
                    <div class="unit">Volts</div>
                </div>
            </div>
        </div>

    </div>

    <div class="chart-section">
        <canvas id="dualChart"></canvas>
    </div>
</div>

<script>
    // --- UUIDs (Identiques pour les deux cartes) ---
    const SERVICE_UUID          = "19b10000-0000-537e-4f6c-d104768a1214";
    const CHAR_PAS_SESSION_UUID = "19b10000-1001-537e-4f6c-d104768a1214";
    const CHAR_VITESSE_UUID     = "19b10000-1003-537e-4f6c-d104768a1214";
    const CHAR_ACCEL_UUID       = "19b10000-1005-537e-4f6c-d104768a1214";
    const CHAR_ETAT_UUID        = "19b10000-1006-537e-4f6c-d104768a1214";
    const CHAR_BATTERY_UUID     = "19b10000-1004-537e-4f6c-d104768a1214";

    // --- VARIABLES DE CONNEXION ---
    let deviceL, deviceR;
    let charResetL = null, charResetR = null;

    // --- CONFIG GRAPHIQUE (2 Lignes) ---
    const ctx = document.getElementById('dualChart').getContext('2d');
    const dualChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: Array(50).fill(''),
            datasets: [
                {
                    label: 'Pied Gauche (g)',
                    data: Array(50).fill(0),
                    borderColor: '#00d2ff',
                    backgroundColor: 'rgba(0, 210, 255, 0.1)',
                    borderWidth: 2,
                    tension: 0.3,
                    pointRadius: 0
                },
                {
                    label: 'Pied Droit (g)',
                    data: Array(50).fill(0),
                    borderColor: '#ffa502',
                    backgroundColor: 'rgba(255, 165, 2, 0.1)',
                    borderWidth: 2,
                    tension: 0.3,
                    pointRadius: 0
                }
            ]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            animation: false,
            scales: {
                y: { min: 0, max: 3.0, grid: { color: '#333' } },
                x: { display: false }
            },
            plugins: { legend: { labels: { color: 'white' } } }
        }
    });

    // --- FONCTION DE CONNEXION GENERIQUE ---
    async function connectDevice(side) {
        const nameFilter = (side === 'L') ? 'NiclaL' : 'NiclaR';
        const btn = document.getElementById('btn' + side);
        const stateLabel = document.getElementById('state' + side);

        try {
            console.log(`Recherche de ${nameFilter}...`);
            const device = await navigator.bluetooth.requestDevice({
                filters: [{ name: nameFilter }],
                optionalServices: [SERVICE_UUID]
            });

            if (side === 'L') deviceL = device;
            else deviceR = device;

            btn.innerText = "CONNEXION...";
            const server = await device.gatt.connect();
            const service = await server.getPrimaryService(SERVICE_UUID);

            // 1. Pas Session & Setup Reset
            const charPas = await service.getCharacteristic(CHAR_PAS_SESSION_UUID);
            await charPas.startNotifications();
            charPas.addEventListener('characteristicvaluechanged', (e) => {
                document.getElementById('steps' + side).innerText = e.target.value.getUint32(0, true);
            });
            
            // On sauvegarde la charactéristique pour pouvoir écrire (Reset) plus tard
            if (side === 'L') charResetL = charPas;
            else charResetR = charPas;

            // 2. Vitesse
            const charVit = await service.getCharacteristic(CHAR_VITESSE_UUID);
            await charVit.startNotifications();
            charVit.addEventListener('characteristicvaluechanged', (e) => {
                document.getElementById('speed' + side).innerText = e.target.value.getFloat32(0, true).toFixed(2);
            });

            // 3. Accélération (Mise à jour Graphique)
            const charAcc = await service.getCharacteristic(CHAR_ACCEL_UUID);
            await charAcc.startNotifications();
            charAcc.addEventListener('characteristicvaluechanged', (e) => {
                let val = e.target.value.getFloat32(0, true);
                document.getElementById('accel' + side).innerText = val.toFixed(2);
                updateChart(side, val);
            });

            // 4. État
            const charEtat = await service.getCharacteristic(CHAR_ETAT_UUID);
            await charEtat.startNotifications();
            charEtat.addEventListener('characteristicvaluechanged', (e) => {
                updateStateUI(side, e.target.value.getUint32(0, true));
            });

            // 5. Batterie
            const charBat = await service.getCharacteristic(CHAR_BATTERY_UUID);
            await charBat.startNotifications();
            charBat.addEventListener('characteristicvaluechanged', (e) => {
                document.getElementById('bat' + side).innerText = e.target.value.getFloat32(0, true).toFixed(2);
            });

            // UI Feedback
            btn.innerText = "CONNECTÉ";
            btn.classList.add("connected");
            stateLabel.innerText = "PRÊT";
            stateLabel.style.color = (side === 'L') ? "#00d2ff" : "#ffa502";
            
            // Activer le bouton Reset si au moins un device est là
            document.getElementById('btnReset').disabled = false;

        } catch (error) {
            console.error(error);
            btn.innerText = "ÉCHEC";
            alert(`Impossible de connecter ${nameFilter} : ` + error);
        }
    }

    // --- MISE A JOUR GRAPHIQUE ---
    function updateChart(side, value) {
        // Dataset 0 = Gauche, Dataset 1 = Droite
        const datasetIndex = (side === 'L') ? 0 : 1;
        const data = dualChart.data.datasets[datasetIndex].data;
        
        data.shift(); // Enlever le plus vieux
        data.push(value); // Ajouter le nouveau
        
        dualChart.update();
    }

    // --- RESET DES DEUX CARTES ---
    async function resetAll() {
        const resetVal = Uint32Array.of(1);
        
        if (charResetL) {
            await charResetL.writeValue(resetVal);
            document.getElementById('stepsL').innerText = "0";
            updateStateUI('L', 0);
        }
        
        if (charResetR) {
            await charResetR.writeValue(resetVal);
            document.getElementById('stepsR').innerText = "0";
            updateStateUI('R', 0);
        }
    }

    // --- UI ETATS ---
    function updateStateUI(side, state) {
        const el = document.getElementById('state' + side);
        const box = document.getElementById('box' + side);
        let color = "#888";
        let text = "REPOS";

        switch(state) {
            case 1: text = "MARCHE"; color = "#2ed573"; break;
            case 2: text = "COURSE"; color = "#ffa502"; break;
            case 3: text = "SPRINT"; color = "#ff4757"; break;
        }

        el.innerText = text;
        el.style.color = color;
        box.style.border = `1px solid ${color}`;
    }

</script>

</body>
</html>
