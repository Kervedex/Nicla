<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nicla Pro Dashboard - M/S²</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* --- STYLE GENERAL --- */
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: #0d0d0d; 
            color: #ffffff; 
            margin: 0; 
            padding: 20px; 
            overflow-x: hidden;
        }

        .container { 
            width: 98%; 
            margin: 0 auto; 
            padding-bottom: 100px; 
        }
        
        /* HEADER */
        header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 30px; 
            border-bottom: 2px solid #333; 
            padding-bottom: 20px; 
        }
        h1 { margin: 0; font-size: 36px; color: #fff; letter-spacing: 1px; }

        /* --- LAYOUT PRINCIPAL --- */
        .main-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 40px; 
            margin-bottom: 40px;
        }

        /* COLONNES */
        .foot-column { 
            background: #181818; 
            padding: 30px; 
            border-radius: 20px; 
            border-top: 8px solid #444; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .left-col { border-top-color: #00d2ff; }
        .right-col { border-top-color: #ffa502; }
        
        .col-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;}
        .col-title { font-size: 28px; margin: 0; font-weight: bold;}

        /* BOUTONS */
        .btn-connect { 
            width: 100%; 
            padding: 20px; 
            margin-bottom: 30px; 
            border: none; 
            border-radius: 12px; 
            font-weight: 900; 
            cursor: pointer; 
            font-size: 20px; 
            text-transform: uppercase;
            transition: all 0.2s; 
        }
        .btn-l { background-color: #00d2ff; color: #000; box-shadow: 0 0 15px rgba(0, 210, 255, 0.3); }
        .btn-l:hover { background-color: #00a0c4; transform: scale(1.02); }
        .btn-r { background-color: #ffa502; color: #000; box-shadow: 0 0 15px rgba(255, 165, 2, 0.3); }
        .btn-r:hover { background-color: #d18802; transform: scale(1.02); }
        .connected { background-color: #2ed573 !important; color: white !important; box-shadow: none; cursor: default;}

        /* --- CARTES --- */
        .metrics-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 25px; 
        }
        .card { 
            background-color: #252525; 
            padding: 25px; 
            border-radius: 15px; 
            text-align: center; 
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .card h3 { 
            margin: 0 0 10px 0; 
            font-size: 14px; 
            color: #bbb; 
            text-transform: uppercase; 
            letter-spacing: 1px;
        }
        .value { 
            font-size: 45px; 
            font-weight: 800; 
            line-height: 1.1;
        }
        .unit { font-size: 16px; color: #666; margin-top: 5px; font-weight: normal;}

        /* --- STATUS BOX --- */
        .status-box { 
            grid-column: span 2; 
            background: #333; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 20px; 
            border-radius: 12px;
            margin-bottom: 10px;
        }
        .status-text { font-size: 32px; font-weight: bold; margin-left: 15px; letter-spacing: 2px;}

        /* --- BATTERIE STYLE --- */
        .battery-container { display: flex; align-items: center; justify-content: center; gap: 10px; }
        .battery-shell { width: 50px; height: 24px; border: 3px solid #ccc; border-radius: 6px; padding: 2px; position: relative; }
        .battery-shell::after { content: ''; position: absolute; right: -7px; top: 6px; width: 4px; height: 12px; background: #ccc; border-radius: 0 2px 2px 0; }
        .battery-level { height: 100%; background-color: #444; width: 0%; border-radius: 3px; transition: width 0.5s, background-color 0.5s; }
        .bat-text { font-size: 20px; font-weight: bold; }

        /* --- GRAPHIQUE --- */
        .chart-section { 
            margin-top: 20px; 
            background-color: #181818; 
            padding: 20px; 
            border-radius: 20px; 
            height: 500px; 
            border: 1px solid #333;
        }

        /* --- CONTROL BAR --- */
        .control-bar {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background-color: #1a1a1a; 
            border-top: 2px solid #444;
            padding: 20px 0; 
            display: flex; justify-content: center; gap: 40px;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.8);
            z-index: 1000;
        }
        .btn-action {
            padding: 15px 40px; border-radius: 40px; border: none; font-weight: bold; cursor: pointer; font-size: 18px; text-transform: uppercase; transition: 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .btn-reset { background: linear-gradient(135deg, #ff4757, #ff6b81); color: white; }
        .btn-calib { background: linear-gradient(135deg, #70a1ff, #1e90ff); color: white; }
        .btn-sleep { background: #57606f; color: #fff; }
        .btn-wake  { background: linear-gradient(135deg, #2ed573, #7bed9f); color: #000; }
        .btn-action:hover { transform: translateY(-3px); box-shadow: 0 6px 12px rgba(0,0,0,0.5); }
        .btn-action:active { transform: translateY(1px); }

    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🏃 DASHBOARD PERFORMANCE</h1>
    </header>

    <div class="main-grid">
        
        <div class="foot-column left-col">
            <div class="col-header">
                <h2 class="col-title" style="color:#00d2ff">PIED GAUCHE</h2>
            </div>
            
            <button id="btnL" class="btn-connect btn-l" onclick="connectDevice('L')">CONNECTER (NiclaL)</button>
            
            <div class="status-box" id="boxL">
                <span style="color:#666; font-size: 18px;">ÉTAT</span> 
                <span id="stateL" class="status-text" style="color:#444">...</span>
            </div>
            
            <div class="metrics-grid">
                <div class="card">
                    <h3>Pas Session</h3>
                    <div class="value" id="stepsL" style="color: #00d2ff;">0</div>
                </div>
                <div class="card">
                    <h3>Vitesse</h3>
                    <div class="value" id="speedL">0.0</div>
                    <div class="unit">m/s</div>
                </div>
                <div class="card">
                    <h3>Accélération</h3>
                    <div class="value" id="accelL">0.0</div>
                    <div class="unit">m/s²</div>
                </div>
                <div class="card">
                    <h3>Batterie</h3>
                    <div class="battery-container">
                        <div class="battery-shell"><div class="battery-level" id="batLevelL"></div></div>
                        <div class="bat-text" id="batTextL">--%</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="foot-column right-col">
            <div class="col-header">
                <h2 class="col-title" style="color:#ffa502">PIED DROIT</h2>
            </div>

            <button id="btnR" class="btn-connect btn-r" onclick="connectDevice('R')">CONNECTER (NiclaR)</button>

            <div class="status-box" id="boxR">
                <span style="color:#666; font-size: 18px;">ÉTAT</span> 
                <span id="stateR" class="status-text" style="color:#444">...</span>
            </div>
            
            <div class="metrics-grid">
                <div class="card">
                    <h3>Pas Session</h3>
                    <div class="value" id="stepsR" style="color: #ffa502;">0</div>
                </div>
                <div class="card">
                    <h3>Vitesse</h3>
                    <div class="value" id="speedR">0.0</div>
                    <div class="unit">m/s</div>
                </div>
                <div class="card">
                    <h3>Accélération</h3>
                    <div class="value" id="accelR">0.0</div>
                    <div class="unit">m/s²</div>
                </div>
                <div class="card">
                    <h3>Batterie</h3>
                    <div class="battery-container">
                        <div class="battery-shell"><div class="battery-level" id="batLevelR"></div></div>
                        <div class="bat-text" id="batTextR">--%</div>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <div class="chart-section">
        <canvas id="dualChart"></canvas>
    </div>
</div>

<div class="control-bar">
    <button class="btn-action btn-wake" onclick="sendCommand(4)">☀ Activer</button>
    <button class="btn-action btn-calib" onclick="sendCommand(2)">⚖ Calibrer</button>
    <button class="btn-action btn-reset" onclick="sendCommand(1)">🔄 Reset Pas</button>
    <button class="btn-action btn-sleep" onclick="sendCommand(3)">🌙 Veille</button>
</div>

<script>
    // --- UUIDS ---
    const SERVICE_UUID          = "19b10000-0000-537e-4f6c-d104768a1214";
    const CHAR_PAS_SESSION_UUID = "19b10000-1001-537e-4f6c-d104768a1214";
    const CHAR_VITESSE_UUID     = "19b10000-1003-537e-4f6c-d104768a1214";
    const CHAR_ACCEL_UUID       = "19b10000-1005-537e-4f6c-d104768a1214";
    const CHAR_ETAT_UUID        = "19b10000-1006-537e-4f6c-d104768a1214";
    const CHAR_BATTERY_UUID     = "19b10000-1004-537e-4f6c-d104768a1214";
    const CHAR_CONTROL_UUID     = "19b10000-5001-537e-4f6c-d104768a1214";

    let charControlL = null;
    let charControlR = null;

    // --- CONFIG GRAPHIQUE (ECHELLE CHANGEE POUR M/S²) ---
    Chart.defaults.font.size = 14;
    Chart.defaults.color = "#888";
    
    const ctx = document.getElementById('dualChart').getContext('2d');
    const dualChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: Array(60).fill(''), 
            datasets: [
                { 
                    label: 'Gauche (m/s²)', 
                    data: Array(60).fill(0), 
                    borderColor: '#00d2ff', 
                    backgroundColor: 'rgba(0, 210, 255, 0.15)', 
                    borderWidth: 3, 
                    tension: 0.3, 
                    pointRadius: 0,
                    fill: true
                },
                { 
                    label: 'Droite (m/s²)', 
                    data: Array(60).fill(0), 
                    borderColor: '#ffa502', 
                    backgroundColor: 'rgba(255, 165, 2, 0.15)', 
                    borderWidth: 3, 
                    tension: 0.3, 
                    pointRadius: 0,
                    fill: true
                }
            ]
        },
        options: {
            responsive: true, 
            maintainAspectRatio: false, 
            animation: false,
            scales: { 
                // Echelle augmentée pour m/s² (3g * 9.81 ≈ 30)
                y: { min: 0, max: 30, grid: { color: '#333' } }, 
                x: { display: false } 
            },
            plugins: { 
                legend: { labels: { color: 'white', font: {size: 16} } } 
            }
        }
    });

    // --- CONNEXION BLE ---
    async function connectDevice(side) {
        const nameFilter = (side === 'L') ? 'NiclaL' : 'NiclaR';
        const btn = document.getElementById('btn' + side);
        
        try {
            const device = await navigator.bluetooth.requestDevice({ filters: [{ name: nameFilter }], optionalServices: [SERVICE_UUID] });
            btn.innerText = "CONNEXION EN COURS...";
            btn.style.backgroundColor = "#555";
            
            const server = await device.gatt.connect();
            const service = await server.getPrimaryService(SERVICE_UUID);

            // Mapping des données
            setupChar(service, CHAR_PAS_SESSION_UUID, (v) => document.getElementById('steps' + side).innerText = v.getUint32(0, true));
            setupChar(service, CHAR_VITESSE_UUID, (v) => document.getElementById('speed' + side).innerText = v.getFloat32(0, true).toFixed(1));
            
            // --- CONVERSION EN M/S² ---
            setupChar(service, CHAR_ACCEL_UUID, (v) => {
                let valG = v.getFloat32(0, true);
                let valMps2 = valG * 9.81; // 1g = 9.81 m/s²
                document.getElementById('accel' + side).innerText = valMps2.toFixed(1);
                updateChart(side, valMps2);
            });

            // Batterie
            setupChar(service, CHAR_BATTERY_UUID, (v) => updateBatteryUI(side, v.getFloat32(0, true)));
            
            setupChar(service, CHAR_ETAT_UUID, (v) => updateStateUI(side, v.getUint32(0, true)));

            // Commande
            const ctrl = await service.getCharacteristic(CHAR_CONTROL_UUID);
            if(side === 'L') charControlL = ctrl; else charControlR = ctrl;

            btn.innerText = "NICLA " + side + " CONNECTÉ";
            btn.classList.add("connected");

        } catch (error) {
            console.error(error);
            alert("Erreur connexion " + nameFilter + " : " + error);
            btn.innerText = "RÉESSAYER";
            btn.style.backgroundColor = (side === 'L') ? "#00d2ff" : "#ffa502";
        }
    }

    async function setupChar(service, uuid, callback) {
        const char = await service.getCharacteristic(uuid);
        await char.startNotifications();
        char.addEventListener('characteristicvaluechanged', (e) => callback(e.target.value));
    }

    async function sendCommand(cmdCode) {
        const val = Uint8Array.of(cmdCode);
        if (charControlL) await charControlL.writeValue(val);
        if (charControlR) await charControlR.writeValue(val);
        
        if(cmdCode === 1) { 
             document.getElementById('stepsL').innerText = "0"; 
             document.getElementById('stepsR').innerText = "0";
             updateStateUI('L', 0); updateStateUI('R', 0);
        }
    }

    // --- LOGIQUE BATTERIE VISUELLE ---
    function updateBatteryUI(side, voltage) {
        let pct = (voltage - 3.5) / (4.2 - 3.5) * 100;
        if (pct > 100) pct = 100;
        if (pct < 0) pct = 0;
        
        const bar = document.getElementById('batLevel' + side);
        const txt = document.getElementById('batText' + side);
        
        bar.style.width = pct + "%";
        txt.innerText = Math.round(pct) + "%";
        
        if (pct > 50) bar.style.backgroundColor = "#2ed573"; 
        else if (pct > 20) bar.style.backgroundColor = "#ffa502";
        else bar.style.backgroundColor = "#ff4757";
    }

    function updateChart(side, value) {
        const idx = (side === 'L') ? 0 : 1;
        const data = dualChart.data.datasets[idx].data;
        data.shift(); data.push(value);
        dualChart.update();
    }

    function updateStateUI(side, state) {
        const el = document.getElementById('state' + side);
        const box = document.getElementById('box' + side);
        let color = "#444", text = "REPOS";
        
        if(state === 1) { text = "MARCHE"; color = "#2ed573"; } 
        if(state === 2) { text = "COURSE"; color = "#ffa502"; } 
        if(state === 3) { text = "SPRINT"; color = "#ff4757"; } 
        
        el.innerText = text;
        el.style.color = (state === 0) ? "#888" : color;
        box.style.border = (state === 0) ? "none" : `2px solid ${color}`;
    }
</script>
</body>
</html>
