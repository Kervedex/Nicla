<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nicla Sense - Dashboard V13 (Stable)</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* --- DESIGN --- */
        body { font-family: 'Segoe UI', sans-serif; background-color: #121212; color: #ffffff; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; padding-bottom: 100px; }
        
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        h1 { margin: 0; font-size: 24px; color: #fff; }

        .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        .foot-column { background: #1a1a1a; padding: 20px; border-radius: 15px; border-top: 5px solid #444; }
        .left-col { border-top-color: #00d2ff; }
        .right-col { border-top-color: #ffa502; }

        .btn-connect { width: 100%; padding: 12px; margin-bottom: 15px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 15px; transition: 0.3s; text-transform: uppercase;}
        .btn-l { background-color: #00d2ff; color: #000; }
        .btn-r { background-color: #ffa502; color: #000; }
        .connected { background-color: #2ed573 !important; color: white !important; cursor: default; }

        .status-box { background: #252525; padding: 10px; border-radius: 5px; text-align: center; margin-bottom: 20px; display: flex; justify-content: center; align-items: center; gap: 10px;}
        .status-label { color: #888; font-size: 12px; font-weight: bold; }
        .status-val { font-weight: bold; font-size: 16px; transition: color 0.3s; }

        .metrics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card { background-color: #252525; padding: 15px; border-radius: 8px; text-align: center; }
        .card h3 { margin: 0 0 5px 0; font-size: 11px; color: #aaa; text-transform: uppercase; }
        .value { font-size: 24px; font-weight: bold; }
        .unit { font-size: 11px; color: #666; }

        .dual-accel { display: flex; justify-content: center; gap: 10px; align-items: baseline; }
        .val-h { color: #00d2ff; }
        .val-v { color: #ff4757; }
        .sub-label { font-size: 10px; color: #555; }

        .battery-wrapper { display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 5px;}
        .battery-shell { width: 35px; height: 16px; border: 2px solid #777; border-radius: 4px; padding: 1px; position: relative; }
        .battery-shell::after { content: ''; position: absolute; right: -5px; top: 4px; width: 3px; height: 8px; background: #777; border-radius: 0 2px 2px 0; }
        .battery-level { height: 100%; width: 0%; background-color: #444; border-radius: 2px; transition: width 0.5s; }
        .bat-text { font-size: 14px; font-weight: bold; color: #fff; }

        .chart-section { margin-top: 30px; background-color: #1e1e1e; padding: 15px; border-radius: 10px; height: 350px; }

        .control-bar {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background-color: #252525; border-top: 1px solid #444;
            padding: 15px 0; display: flex; justify-content: center; gap: 20px;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.5); z-index: 999;
        }
        .btn-action { padding: 10px 25px; border-radius: 30px; border: none; font-weight: bold; cursor: pointer; font-size: 14px; text-transform: uppercase; transition: 0.2s; }
        .btn-reset { background-color: #ff4757; color: white; }
        .btn-calib { background-color: #70a1ff; color: white; }
        .btn-sleep { background-color: #a4b0be; color: #2f3542; }
        .btn-wake  { background-color: #2ed573; color: white; }
        .btn-action:hover { transform: scale(1.05); filter: brightness(1.1); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>👟 Nicla V13 (Stabilisée)</h1>
    </header>

    <div class="main-grid">
        <div class="foot-column left-col">
            <button id="btnL" class="btn-connect btn-l" onclick="connectDevice('L')">CONNECTER GAUCHE</button>
            <div class="status-box" id="boxL">
                <span class="status-label">ÉTAT:</span> <span id="stateL" class="status-val" style="color:#666">ARRÊT</span>
            </div>
            <div class="metrics-grid">
                <div class="card">
                    <h3>Pas</h3>
                    <div class="value" id="stepsL" style="color: #00d2ff;">0</div>
                </div>
                <div class="card">
                    <h3>Vitesse (Moy)</h3>
                    <div class="value" id="speedL">0.0</div>
                    <div class="unit">km/h</div>
                </div>
                <div class="card">
                    <h3>Accélération (H | V)</h3>
                    <div class="dual-accel">
                        <div style="text-align:center"><span class="value val-h" id="accelHorizL">0.0</span><br><span class="sub-label">HORIZ</span></div>
                        <span style="color:#444">|</span>
                        <div style="text-align:center"><span class="value val-v" id="accelVertL">0.0</span><br><span class="sub-label">VERT</span></div>
                    </div>
                    <div class="unit">m/s²</div>
                </div>
                <div class="card">
                    <h3>Batterie</h3>
                    <div class="battery-wrapper">
                        <div class="battery-shell"><div class="battery-level" id="batLevelL"></div></div>
                        <span class="bat-text" id="batTextL">--%</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="foot-column right-col">
            <button id="btnR" class="btn-connect btn-r" onclick="connectDevice('R')">CONNECTER DROITE</button>
            <div class="status-box" id="boxR">
                <span class="status-label">ÉTAT:</span> <span id="stateR" class="status-val" style="color:#666">ARRÊT</span>
            </div>
            <div class="metrics-grid">
                <div class="card">
                    <h3>Pas</h3>
                    <div class="value" id="stepsR" style="color: #ffa502;">0</div>
                </div>
                <div class="card">
                    <h3>Vitesse (Moy)</h3>
                    <div class="value" id="speedR">0.0</div>
                    <div class="unit">km/h</div>
                </div>
                <div class="card">
                    <h3>Accélération (H | V)</h3>
                    <div class="dual-accel">
                        <div style="text-align:center"><span class="value val-h" id="accelHorizR">0.0</span><br><span class="sub-label">HORIZ</span></div>
                        <span style="color:#444">|</span>
                        <div style="text-align:center"><span class="value val-v" id="accelVertR">0.0</span><br><span class="sub-label">VERT</span></div>
                    </div>
                    <div class="unit">m/s²</div>
                </div>
                <div class="card">
                    <h3>Batterie</h3>
                    <div class="battery-wrapper">
                        <div class="battery-shell"><div class="battery-level" id="batLevelR"></div></div>
                        <span class="bat-text" id="batTextR">--%</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="chart-section">
        <canvas id="dualChart"></canvas>
    </div>
</div>

<div class="control-bar">
    <button class="btn-action btn-wake" onclick="sendCommand(4)">☀ RÉVEIL</button>
    <button class="btn-action btn-calib" onclick="sendCommand(2)">⚖ CALIBRER</button>
    <button class="btn-action btn-reset" onclick="sendCommand(1)">🔄 RESET</button>
    <button class="btn-action btn-sleep" onclick="sendCommand(3)">🌙 VEILLE</button>
</div>

<script>
    const SERVICE_UUID          = "19b10000-0000-537e-4f6c-d104768a1214";
    const CHAR_PAS_SESSION_UUID = "19b10000-1001-537e-4f6c-d104768a1214";
    const CHAR_VITESSE_UUID     = "19b10000-1003-537e-4f6c-d104768a1214";
    const CHAR_BATTERY_UUID     = "19b10000-1004-537e-4f6c-d104768a1214";
    const CHAR_ACCEL_HORIZ_UUID = "19b10000-1005-537e-4f6c-d104768a1214"; 
    const CHAR_ACCEL_VERT_UUID  = "19b10000-1007-537e-4f6c-d104768a1214"; 
    const CHAR_CONTROL_UUID     = "19b10000-5001-537e-4f6c-d104768a1214"; 

    let charControlL = null, charControlR = null;

    // --- VARIABLES DE STABILISATION ---
    // Timers pour retarder l'arrêt uniquement
    let stopTimers = { L: null, R: null };
    const STOP_GRACE_PERIOD = 1500; // 1.5 secondes avant de confirmer l'arrêt

    // Buffers pour lisser la vitesse (moyenne glissante sur 5 valeurs)
    let speedHistory = { L: [], R: [] };
    const HISTORY_SIZE = 5;

    // --- CONFIG GRAPHIQUE ---
    const ctx = document.getElementById('dualChart').getContext('2d');
    const dualChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: Array(60).fill(''),
            datasets: [
                { label: 'Accélération GAUCHE', data: Array(60).fill(0), borderColor: '#00d2ff', borderWidth: 2, tension: 0.3, pointRadius: 0 },
                { label: 'Accélération DROITE', data: Array(60).fill(0), borderColor: '#ffa502', borderWidth: 2, tension: 0.3, pointRadius: 0 }
            ]
        },
        options: {
            responsive: true, maintainAspectRatio: false, animation: false,
            scales: { y: { min: 0, max: 20, grid: { color: '#333' } }, x: { display: false } },
            plugins: { legend: { labels: { color: 'white' } } }
        }
    });

    // --- CONNEXION ---
    async function connectDevice(side) {
        const nameFilter = (side === 'L') ? 'NiclaL' : 'NiclaR'; 
        const btn = document.getElementById('btn' + side);

        try {
            const device = await navigator.bluetooth.requestDevice({ filters: [{ name: nameFilter }], optionalServices: [SERVICE_UUID] });
            btn.innerText = "CONNEXION...";
            const server = await device.gatt.connect();
            const service = await server.getPrimaryService(SERVICE_UUID);

            // PAS
            setupChar(service, CHAR_PAS_SESSION_UUID, 'int', (v) => document.getElementById('steps' + side).innerText = v);
            
            // --- VITESSE & GESTION D'ÉTAT ---
            setupChar(service, CHAR_VITESSE_UUID, 'float', (v) => {
                // 1. Lissage : Calcul de la moyenne des X dernières valeurs
                updateSpeedHistory(side, v);
                const avgSpeed = getAverageSpeed(side);
                
                document.getElementById('speed' + side).innerText = avgSpeed.toFixed(1);

                // 2. Détermination de l'état CIBLE
                let targetState = 0; // Arrêt par défaut
                
                // Hystérésis : On considère qu'on bouge vraiment si > 0.8 km/h en moyenne
                if (avgSpeed >= 0.8 && avgSpeed < 6.0) targetState = 1;      // Marche
                else if (avgSpeed >= 6.0 && avgSpeed < 15.0) targetState = 2; // Course
                else if (avgSpeed >= 15.0) targetState = 3;                   // Sprint

                // 3. Application de l'état avec Anti-Clignotement
                handleStateLogic(side, targetState, avgSpeed);
            });
            
            // --- ACCÉLÉRATION (AIDE AU DÉMARRAGE) ---
            setupChar(service, CHAR_ACCEL_HORIZ_UUID, 'float', (accel) => {
                document.getElementById('accelHoriz' + side).innerText = accel.toFixed(1);
                updateChart(side, accel);

                // LOGIQUE DE DÉMARRAGE RAPIDE :
                // Si on détecte une forte accélération (> 2.5) ALORS qu'on est à l'arrêt,
                // On force immédiatement l'état MARCHE sans attendre que la moyenne de vitesse monte.
                // Cela rend le démarrage ultra-réactif.
                if (accel > 2.5 && isStopped(side)) {
                     forceState(side, 1); // Force MARCHE
                }
            });

            setupChar(service, CHAR_ACCEL_VERT_UUID, 'float', (v) => document.getElementById('accelVert' + side).innerText = v.toFixed(1));
            setupChar(service, CHAR_BATTERY_UUID, 'float', (v) => updateBatteryUI(side, v));

            const ctrl = await service.getCharacteristic(CHAR_CONTROL_UUID);
            if(side === 'L') charControlL = ctrl; else charControlR = ctrl;

            btn.innerText = "CONNECTÉ";
            btn.classList.add("connected");

        } catch (error) { console.error(error); btn.innerText = "ECHEC"; }
    }

    async function setupChar(service, uuid, type, callback) {
        try {
            const char = await service.getCharacteristic(uuid);
            await char.startNotifications();
            char.addEventListener('characteristicvaluechanged', (e) => {
                const val = e.target.value;
                let parsed = (type === 'int') ? val.getUint32(0, true) : val.getFloat32(0, true);
                callback(parsed);
            });
        } catch(e) {}
    }

    // --- FONCTIONS LOGIQUES ---

    function updateSpeedHistory(side, newSpeed) {
        speedHistory[side].push(newSpeed);
        if (speedHistory[side].length > HISTORY_SIZE) {
            speedHistory[side].shift(); // Retire la plus vieille
        }
    }

    function getAverageSpeed(side) {
        if (speedHistory[side].length === 0) return 0;
        const sum = speedHistory[side].reduce((a, b) => a + b, 0);
        return sum / speedHistory[side].length;
    }

    function isStopped(side) {
        const el = document.getElementById('state' + side);
        return el.innerText === "ARRÊT";
    }

    function handleStateLogic(side, targetState, avgSpeed) {
        // CAS A : On est en mouvement (Marche/Course/Sprint)
        if (targetState > 0) {
            // Si un arrêt était prévu (timer actif), on l'annule car on bouge encore/nouveau
            if (stopTimers[side]) {
                clearTimeout(stopTimers[side]);
                stopTimers[side] = null;
            }
            // On met à jour l'interface immédiatement
            updateUI(side, targetState);
        }
        
        // CAS B : La vitesse indique un arrêt (targetState == 0)
        else {
            // On ne passe pas à 0 tout de suite !
            // Si on n'a pas déjà lancé un minuteur d'arrêt, on le lance.
            if (!stopTimers[side]) {
                stopTimers[side] = setTimeout(() => {
                    // Si après le délai (1.5s), on est toujours censé être à l'arrêt, on valide.
                    updateUI(side, 0);
                    stopTimers[side] = null;
                }, STOP_GRACE_PERIOD);
            }
        }
    }

    function forceState(side, state) {
        // Annule tout timer d'arrêt
        if (stopTimers[side]) {
            clearTimeout(stopTimers[side]);
            stopTimers[side] = null;
        }
        updateUI(side, state);
    }

    function updateUI(side, state) {
        const el = document.getElementById('state' + side);
        const box = document.getElementById('box' + side);
        const states = ["ARRÊT", "MARCHE", "COURSE", "SPRINT"];
        
        // Petite optimisation DOM
        if (el.innerText === states[state]) return;

        let color = "#666";
        if(state === 1) color = "#2ed573"; 
        if(state === 2) color = "#ffa502"; 
        if(state === 3) color = "#ff4757"; 
        
        el.innerText = states[state] || "INCONNU"; 
        if(state === 0) {
            el.style.color = "#888"; box.style.border = "none";
        } else {
            el.style.color = color; box.style.border = `1px solid ${color}`;
        }
    }

    // --- RESTE DU CODE (COMMANDES, GRAPHIQUE...) ---
    async function sendCommand(cmdCode) {
        const val = Uint8Array.of(cmdCode);
        if (charControlL) await charControlL.writeValue(val);
        if (charControlR) await charControlR.writeValue(val);
        if(cmdCode === 1) { 
             document.getElementById('stepsL').innerText = "0"; 
             document.getElementById('stepsR').innerText = "0";
             forceState('L', 0); forceState('R', 0);
             speedHistory['L'] = []; speedHistory['R'] = [];
        }
    }

    function updateChart(side, value) {
        const idx = (side === 'L') ? 0 : 1;
        const data = dualChart.data.datasets[idx].data;
        data.shift(); data.push(value);
        dualChart.update();
    }

    function updateBatteryUI(side, voltage) {
        let pct = (voltage - 3.3) / (4.2 - 3.3) * 100;
        if (pct > 100) pct = 100; if (pct < 0) pct = 0;
        const bar = document.getElementById('batLevel' + side);
        const txt = document.getElementById('batText' + side);
        txt.innerText = Math.round(pct) + "%";
        bar.style.width = pct + "%";
        if (pct > 50) bar.style.backgroundColor = "#2ed573"; 
        else if (pct > 20) bar.style.backgroundColor = "#ffa502";
        else bar.style.backgroundColor = "#ff4757";
    }
</script>
</body>
</html>
