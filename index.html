<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nicla Debug</title>
    <style>
        :root { --p: #007bff; --s: #28a745; --d: #343a40; }
        body { font-family: sans-serif; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; width: 100%; max-width: 900px; }
        .card { background: white; padding: 20px; border-radius: 15px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        #motion-badge { padding: 10px 30px; border-radius: 50px; font-weight: bold; color: white; background: #666; display: inline-block; }
        .moving { background: var(--p) !important; }
        button { padding: 15px 30px; border-radius: 50px; background: var(--s); color: white; border: none; cursor: pointer; margin-bottom: 20px; }
    </style>
</head>
<body>
    <h1>Nicla Tracker</h1>
    <button id="conn">CONNEXION</button>
    <div class="grid">
        <div class="card" style="grid-column: 1/-1;"><h2>État</h2><div id="motion-badge">À L'ARRÊT</div></div>
        <div class="card"><h2>Batterie</h2><p id="batt">--V</p></div>
        <div class="card"><h2>aTot</h2><p id="atot">0.00</p></div>
        <div class="card"><h2>Pas Session</h2><p id="pasS">0</p></div>
        <div class="card"><h2>Pas Total</h2><p id="pasT">0</p></div>
    </div>

    <script>
        const SERVICE_UUID = "19b10000-0000-537e-4f6c-d104768a1214";
        const U = {
            pasS: "19b10000-1001-537e-4f6c-d104768a1214",
            pasT: "19b10000-1002-537e-4f6c-d104768a1214",
            batt: "19b10000-1004-537e-4f6c-d104768a1214",
            atot: "19b10000-1005-537e-4f6c-d104768a1214",
            etat: "19b10000-1006-537e-4f6c-d104768a1214"
        };

        document.getElementById('conn').addEventListener('click', async () => {
            const device = await navigator.bluetooth.requestDevice({
                filters: [{ namePrefix: 'Nicla' }], optionalServices: [SERVICE_UUID]
            });
            const server = await device.gatt.connect();
            const service = await server.getPrimaryService(SERVICE_UUID);

            // 1. Écoute ETAT (Mouvement)
            const cEtat = await service.getCharacteristic(U.etat);
            await cEtat.startNotifications();
            cEtat.addEventListener('characteristicvaluechanged', (e) => {
                let v = e.target.value.getUint32(0, true);
                const b = document.getElementById('motion-badge');
                b.innerText = v == 1 ? "EN MARCHE" : "À L'ARRÊT";
                b.className = v == 1 ? "moving" : "";
            });

            // 2. Écoute BATTERIE (Voltage brut)
            const cBatt = await service.getCharacteristic(U.batt);
            await cBatt.startNotifications();
            cBatt.addEventListener('characteristicvaluechanged', (e) => {
                let v = e.target.value.getFloat32(0, true);
                document.getElementById('batt').innerText = v.toFixed(2) + " V";
            });

            // 3. Le reste
            const listen = async (uuid, id, isFloat) => {
                const c = await service.getCharacteristic(uuid);
                await c.startNotifications();
                c.addEventListener('characteristicvaluechanged', (e) => {
                    let v = isFloat ? e.target.value.getFloat32(0, true).toFixed(2) : e.target.value.getUint32(0, true);
                    document.getElementById(id).innerText = v;
                });
            };
            listen(U.pasS, 'pasS', false);
            listen(U.pasT, 'pasT', false);
            listen(U.atot, 'atot', true);
        });
    </script>
</body>
</html>
