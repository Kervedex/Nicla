<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nicla Tracker Full - Fix Batterie</title>
    <style>
        :root { --p: #007bff; --s: #28a745; --w: #ffc107; --d: #343a40; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; width: 100%; max-width: 900px; margin-top: 20px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        #motion-badge { display: inline-block; padding: 10px 30px; border-radius: 50px; font-weight: bold; color: white; background: #666; margin-top: 10px; }
        .moving { background: var(--p) !important; }
        .battery-bar { width: 100%; height: 10px; background: #eee; border-radius: 5px; margin-top: 10px; overflow: hidden; }
        #bar-fill { width: 0%; height: 100%; background: var(--s); transition: 0.5s; }
        button { padding: 15px 30px; border-radius: 50px; border: none; background: var(--s); color: white; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <h1>Nicla Tracker Full</h1>
    <button id="conn">SE CONNECTER</button>

    <div class="grid">
        <div class="card" style="grid-column: 1 / -1;">
            <h2>Type de mouvement</h2>
            <div id="motion-badge">À L'ARRÊT</div>
        </div>

        <div class="card">
            <h2>Batterie</h2>
            <p id="batt">--%</p>
            <div class="battery-bar"><div id="bar-fill"></div></div>
        </div>

        <div class="card">
            <h2>Accélération [m/s²]</h2>
            <p id="atot">0.00 <small>m/s²</small></p>
        </div>

        <div class="card">
            <h2>Vitesse [m/s]</h2>
            <p id="vit">0.0 <small>m/s</small></p>
        </div>

        <div class="card" style="border-bottom: 5px solid var(--p);">
            <h2>Pas (Session)</h2>
            <p id="pasS">0</p>
        </div>

        <div class="card" style="border-bottom: 5px solid var(--d);">
            <h2>Pas (Total Cumulé)</h2>
            <p id="pasT">0</p>
        </div>
    </div>

    <script>
        const SERVICE_UUID = "19b10000-0000-537e-4f6c-d104768a1214";
        const UUIDS = {
            pasS: "19b10000-1001-537e-4f6c-d104768a1214",
            pasT: "19b10000-1002-537e-4f6c-d104768a1214",
            vit:  "19b10000-1003-537e-4f6c-d104768a1214",
            batt: "19b10000-1004-537e-4f6c-d104768a1214",
            atot: "19b10000-1005-537e-4f6c-d104768a1214",
            etat: "19b10000-1006-537e-4f6c-d104768a1214"
        };

        document.getElementById('conn').addEventListener('click', async () => {
            try {
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ namePrefix: 'Nicla' }], optionalServices: [SERVICE_UUID]
                });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                document.getElementById('conn').innerText = "CONNECTÉ";
                document.getElementById('conn').style.background = "#666";

                const listen = async (uuid, id, isFloat = false, isBatt = false) => {
                    const c = await service.getCharacteristic(uuid);
                    await c.startNotifications();
                    c.addEventListener('characteristicvaluechanged', (e) => {
                        
                        // Détermine si on lit un Float (4 bytes) ou un Int
                        let v = (isFloat || isBatt) ? e.target.value.getFloat32(0, true) : e.target.value.getUint32(0, true);
                        
                        if(id === 'etat') {
                            const b = document.getElementById('motion-badge');
                            b.innerText = v == 1 ? "EN MARCHE" : "À L'ARRÊT";
                            b.className = v == 1 ? "moving" : "";
                        } 
                        else if(isBatt) {
                            // Conversion Voltage (ex: 3.8) -> Pourcentage
                            // Seuil bas: 3.4V, Seuil haut: 4.2V
                            let pct = Math.round((v - 3.4) * 100 / (4.2 - 3.4));
                            if (pct > 100) pct = 100;
                            if (pct < 0) pct = 0;

                            document.getElementById('batt').innerText = pct + "% (" + v.toFixed(2) + "V)";
                            document.getElementById('bar-fill').style.width = pct + "%";
                            
                            // Couleur dynamique
                            const fill = document.getElementById('bar-fill');
                            if(pct > 50) fill.style.background = "#28a745";
                            else if(pct > 20) fill.style.background = "#ffc107";
                            else fill.style.background = "#dc3545";
                        } 
                        else {
                            // Pour les autres valeurs
                            document.getElementById(id).innerText = isFloat ? v.toFixed(2) : v;
                        }
                    });
                };

                // Lancement des écoutes
                listen(UUIDS.pasS, 'pasS');
                listen(UUIDS.pasT, 'pasT');
                listen(UUIDS.vit, 'vit', true);
                listen(UUIDS.atot, 'atot', true);
                listen(UUIDS.etat, 'etat');
                listen(UUIDS.batt, 'batt', false, true); // Flag isBatt activé

            } catch (err) {
                console.error("Erreur de connexion : ", err);
                alert("Erreur de connexion Bluetooth");
            }
        });
    </script>
</body>
</html>
