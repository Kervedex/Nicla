<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nicla Twin Run - V9</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #0b0d10;
            --card-bg: #161920;
            --text-main: #ffffff;
            --text-sub: #7a8a9e;
            --accent-cyan: #00e5ff; 
            --accent-red: #ff3b3b;
            --accent-green: #00ff88;
            --accent-yellow: #ffcc00;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            text-align: center;
        }

        /* HEADER & CONNEXION */
        .header-controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .connect-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--text-sub);
            padding: 15px 30px;
            color: white;
            border-radius: 12px;
            cursor: pointer;
            width: 160px;
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .connect-btn:hover { background: rgba(255, 255, 255, 0.1); }
        .connect-btn.connected { border-color: var(--accent-green); background: rgba(0, 255, 136, 0.1); }
        
        .bt-icon { font-size: 1.5rem; margin-bottom: 5px; }
        .status-text { font-size: 0.8rem; color: var(--text-sub); }

        /* BATTERIE BARRE */
        .batt-container {
            width: 100%;
            margin-top: 8px;
            background: #333;
            height: 6px;
            border-radius: 3px;
            overflow: hidden;
            position: relative;
        }
        .batt-fill {
            height: 100%;
            width: 0%;
            background: var(--accent-green);
            transition: width 0.5s, background 0.5s;
        }
        .batt-label { font-size: 0.7rem; margin-top: 4px; color: var(--text-sub); }

        /* METRICS PRINCIPAUX (Vitesse / Pas) */
        .main-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            max-width: 800px;
            margin: 0 auto 30px auto;
        }
        .big-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .big-val { font-size: 3rem; font-weight: 800; }
        .big-label { color: var(--text-sub); text-transform: uppercase; font-size: 0.9rem; letter-spacing: 1px; }

        /* SPLIT GAUCHE / DROITE */
        .split-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        .foot-card {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 15px;
            border-top: 3px solid #333;
        }
        .foot-card.left { border-top-color: var(--accent-cyan); }
        .foot-card.right { border-top-color: var(--accent-red); }

        .foot-title { font-weight: bold; margin-bottom: 15px; display: block; }

        .mini-stat {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            font-size: 0.9rem;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 5px;
        }
        .mini-val { font-weight: bold; font-family: monospace; font-size: 1.1rem; }

        /* GRAPHIQUE */
        .chart-wrapper {
            max-width: 800px;
            height: 250px;
            margin: 30px auto;
            background: var(--card-bg);
            padding: 10px;
            border-radius: 15px;
        }

    </style>
</head>
<body>

    <h2 style="letter-spacing: 2px;">NICLA <span style="color:var(--accent-cyan)">TWIN</span> SYSTEM</h2>

    <div class="header-controls">
        <button id="btnL" class="connect-btn" onclick="connectDevice('L')">
            <div class="bt-icon">🦶 GAUCHE</div>
            <div id="statusL" class="status-text">Déconnecté</div>
            <div class="batt-container"><div id="battBarL" class="batt-fill"></div></div>
            <div id="battTextL" class="batt-label">--%</div>
        </button>

        <button id="btnR" class="connect-btn" onclick="connectDevice('R')">
            <div class="bt-icon">DROITE 🦶</div>
            <div id="statusR" class="status-text">Déconnecté</div>
            <div class="batt-container"><div id="battBarR" class="batt-fill"></div></div>
            <div id="battTextR" class="batt-label">--%</div>
        </button>
    </div>

    <div class="main-stats">
        <div class="big-card">
            <div class="big-label">Vitesse Moyenne</div>
            <div class="big-val" style="color:var(--accent-yellow)">
                <span id="globalSpeed">0.0</span><span style="font-size:1rem"> km/h</span>
            </div>
        </div>
        <div class="big-card">
            <div class="big-label">Total Pas (G+D)</div>
            <div class="big-val">
                <span id="globalSteps">0</span>
            </div>
        </div>
    </div>

    <div class="split-container">
        <div class="foot-card left">
            <span class="foot-title" style="color:var(--accent-cyan)">GAUCHE (Bleu)</span>
            <div class="mini-stat">
                <span>Propulsion (H)</span>
                <span id="horizL" class="mini-val">0.0</span>
            </div>
            <div class="mini-stat">
                <span>Impact (V)</span>
                <span id="vertL" class="mini-val">0.0</span>
            </div>
            <div class="mini-stat">
                <span>Pas Session</span>
                <span id="stepsL" class="mini-val">0</span>
            </div>
        </div>

        <div class="foot-card right">
            <span class="foot-title" style="color:var(--accent-red)">DROITE (Rouge)</span>
            <div class="mini-stat">
                <span>Propulsion (H)</span>
                <span id="horizR" class="mini-val">0.0</span>
            </div>
            <div class="mini-stat">
                <span>Impact (V)</span>
                <span id="vertR" class="mini-val">0.0</span>
            </div>
            <div class="mini-stat">
                <span>Pas Session</span>
                <span id="stepsR" class="mini-val">0</span>
            </div>
        </div>
    </div>

    <div class="chart-wrapper">
        <canvas id="twinChart"></canvas>
    </div>

    <script>
        // --- CONFIGURATION ---
        const SERVICE_UUID = "19b10000-0000-537e-4f6c-d104768a1214";
        const UUIDS = {
            SESSION: "19b10000-1001-537e-4f6c-d104768a1214",
            SPEED:   "19b10000-1003-537e-4f6c-d104768a1214",
            BATT:    "19b10000-1004-537e-4f6c-d104768a1214",
            HORIZ:   "19b10000-1005-537e-4f6c-d104768a1214",
            VERT:    "19b10000-1007-537e-4f6c-d104768a1214"
        };

        // --- ETAT DU SYSTEME ---
        const system = {
            L: { connected: false, speed: 0, steps: 0, horiz: 0, vert: 0, device: null },
            R: { connected: false, speed: 0, steps: 0, horiz: 0, vert: 0, device: null }
        };

        // --- GRAPH (Chart.js) ---
        const ctx = document.getElementById('twinChart').getContext('2d');
        const chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: Array(50).fill(''),
                datasets: [
                    {
                        label: 'Propulsion GAUCHE',
                        borderColor: '#00e5ff',
                        borderWidth: 2,
                        tension: 0.3,
                        pointRadius: 0,
                        data: Array(50).fill(0)
                    },
                    {
                        label: 'Propulsion DROITE',
                        borderColor: '#ff3b3b',
                        borderWidth: 2,
                        tension: 0.3,
                        pointRadius: 0,
                        data: Array(50).fill(0)
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: { beginAtZero: true, suggestedMax: 10, grid: { color: '#333' } },
                    x: { display: false }
                },
                plugins: { legend: { labels: { color: 'white' } } },
                animation: false
            }
        });

        // --- FONCTION DE CONNEXION (Générique) ---
        async function connectDevice(side) {
            try {
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ namePrefix: 'Nicla' }], // Scanne tout ce qui s'appelle Nicla...
                    optionalServices: [SERVICE_UUID]
                });

                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);

                // UI Update
                document.getElementById(`btn${side}`).classList.add('connected');
                document.getElementById(`status${side}`).innerText = "Connecté: " + device.name;
                system[side].connected = true;
                system[side].device = device;

                // Setup Listeners
                setupChar(service, UUIDS.SESSION, 'int', (v) => {
                    system[side].steps = v;
                    updateUI(side, 'steps', v);
                    updateGlobals();
                });

                setupChar(service, UUIDS.SPEED, 'float', (v) => {
                    system[side].speed = v * 3.6; // m/s to km/h
                    updateGlobals();
                });

                setupChar(service, UUIDS.HORIZ, 'float', (v) => {
                    system[side].horiz = v;
                    updateUI(side, 'horiz', v.toFixed(1));
                    updateChartData(side, v);
                });

                setupChar(service, UUIDS.VERT, 'float', (v) => {
                    system[side].vert = v;
                    updateUI(side, 'vert', v.toFixed(1));
                });

                setupChar(service, UUIDS.BATT, 'float', (v) => {
                    updateBatteryUI(side, v);
                });

                device.addEventListener('gattserverdisconnected', () => {
                    system[side].connected = false;
                    document.getElementById(`btn${side}`).classList.remove('connected');
                    document.getElementById(`status${side}`).innerText = "Déconnecté";
                });

            } catch (err) {
                console.error(err);
                alert("Erreur connexion: " + err);
            }
        }

        // --- HELPERS ---

        async function setupChar(service, uuid, type, callback) {
            try {
                const char = await service.getCharacteristic(uuid);
                await char.startNotifications();
                char.addEventListener('characteristicvaluechanged', (e) => {
                    const val = e.target.value;
                    let parsed = (type === 'int') ? val.getUint32(0, true) : val.getFloat32(0, true);
                    callback(parsed);
                });
            } catch (e) { console.warn("Missing char", uuid); }
        }

        function updateUI(side, type, val) {
            document.getElementById(`${type}${side}`).innerText = val;
        }

        function updateGlobals() {
            // Pas total = Somme G + D
            const totalSteps = system.L.steps + system.R.steps;
            document.getElementById('globalSteps').innerText = totalSteps;

            // Vitesse = Moyenne des capteurs actifs
            let speedSum = 0;
            let count = 0;
            if (system.L.connected) { speedSum += system.L.speed; count++; }
            if (system.R.connected) { speedSum += system.R.speed; count++; }
            
            let avgSpeed = count > 0 ? (speedSum / count) : 0;
            document.getElementById('globalSpeed').innerText = avgSpeed.toFixed(1);
        }

        function updateBatteryUI(side, voltage) {
            // Conversion 3.3V (0%) -> 4.2V (100%)
            let pct = (voltage - 3.3) / (4.2 - 3.3) * 100;
            pct = Math.max(0, Math.min(100, pct)); // Borner entre 0 et 100

            // Couleur
            let color = '#ff3b3b'; // Rouge
            if (pct > 20) color = '#ffcc00'; // Jaune
            if (pct > 50) color = '#00ff88'; // Vert

            const bar = document.getElementById(`battBar${side}`);
            const txt = document.getElementById(`battText${side}`);

            bar.style.width = pct + "%";
            bar.style.backgroundColor = color;
            txt.innerText = Math.round(pct) + "% (" + voltage.toFixed(2) + "V)";
        }

        function updateChartData(side, val) {
            // Index 0 = Gauche, Index 1 = Droite
            const datasetIndex = (side === 'L') ? 0 : 1;
            const dataArr = chart.data.datasets[datasetIndex].data;
            dataArr.shift();
            dataArr.push(val);
            chart.update(); // Note: Mise à jour fréquente, peut être optimisé si lag
        }

    </script>
</body>
</html>
